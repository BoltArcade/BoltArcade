<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>BOLT</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@500;700&display=swap');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{height:100%;height:-webkit-fill-available}
body{
  width:100%;height:100vh;height:100dvh;
  overflow:hidden;
  background:#111118;
  touch-action:none;
  -webkit-tap-highlight-color:transparent;
  -webkit-user-select:none;user-select:none;
  display:flex;flex-direction:column;align-items:center;
  justify-content:space-between;
  padding:env(safe-area-inset-top,8px) 0 env(safe-area-inset-bottom,8px);
  font-family:'Inter',sans-serif;
  color:#fff;
}

/* BACK BTN */
#back-btn{
  display:inline-block;
  font-size:clamp(9px,2vw,11px);letter-spacing:0.2em;
  color:rgba(255,255,255,0.25);text-decoration:none;
  text-transform:uppercase;margin-bottom:2px;
  transition:color 0.15s;
}
#back-btn:hover{color:rgba(255,255,255,0.6);}

/* HEADER */
#header{flex-shrink:0;text-align:center;padding:4px 0}
#title{
  font-family:'Russo One',sans-serif;
  font-size:clamp(30px,8vw,54px);
  letter-spacing:0.12em;
  background:linear-gradient(90deg,#f9c846 0%,#f97316 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;
}
#tagline{
  font-size:clamp(9px,2vw,11px);
  color:rgba(255,255,255,0.25);
  letter-spacing:0.3em;text-transform:uppercase;margin-top:3px;
}

/* CANVAS */
#wrap{
  flex:1 1 auto;position:relative;
  width:min(96vw,860px);min-height:0;
  margin:6px 0;border-radius:14px;overflow:hidden;
  background:#0c0c14;
  box-shadow:0 0 0 1.5px rgba(249,200,70,0.2), 0 12px 48px rgba(0,0,0,0.7);
}
canvas{display:block;width:100%;height:100%}

/* HUD */
#hud{
  flex-shrink:0;display:flex;gap:8px;
  width:min(96vw,860px);padding:0 1px;
}
.hc{
  flex:1;background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;padding:5px 8px;text-align:center;
}
.hl{font-size:clamp(7px,1.8vw,9px);color:rgba(255,255,255,0.28);letter-spacing:0.25em;text-transform:uppercase}
.hv{
  display:block;font-family:'Russo One',sans-serif;
  font-size:clamp(17px,4.5vw,24px);line-height:1.1;color:#fff;
}
#hc1 .hv{color:#f9c846}
#hc2 .hv{color:rgba(255,255,255,0.4)}
#hc3 .hv{color:#4cc9f0}

/* JUMP BTN */
#jbtn{
  flex-shrink:0;width:min(96vw,860px);
  padding:clamp(12px,3vh,20px) 0;
  background:linear-gradient(90deg,#f9c846,#f97316);
  border:none;border-radius:14px;
  color:#111118;font-family:'Russo One',sans-serif;
  font-size:clamp(13px,2vw,16px);letter-spacing:0.15em;text-transform:uppercase;
  cursor:pointer;-webkit-appearance:none;appearance:none;outline:none;
  touch-action:manipulation;
  box-shadow:0 4px 24px rgba(249,200,70,0.35),0 2px 0 rgba(0,0,0,0.3);
  transition:transform 0.07s,box-shadow 0.07s;
}
#jbtn:hover{box-shadow:0 6px 32px rgba(249,200,70,0.5),0 2px 0 rgba(0,0,0,0.3);}
#jbtn:active{transform:scale(0.97) translateY(2px);box-shadow:0 2px 10px rgba(249,200,70,0.25)}

/* OVERLAY */
#ov{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  background:rgba(12,12,20,0.88);
  border-radius:14px;
  transition:opacity 0.25s;pointer-events:auto;
}
#ov.hidden{opacity:0;pointer-events:none}
#ov-t{
  font-family:'Russo One',sans-serif;
  font-size:clamp(22px,7vw,46px);letter-spacing:0.12em;
  background:linear-gradient(90deg,#f9c846,#f97316);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
#ov-m{
  font-size:clamp(10px,2.6vw,13px);color:rgba(255,255,255,0.4);
  letter-spacing:0.18em;text-align:center;padding:0 20px;line-height:1.6;font-weight:500;
}
#ov-m .big{
  font-family:'Russo One',sans-serif;font-size:clamp(20px,6vw,32px);
  color:#f9c846;-webkit-text-fill-color:#f9c846;vertical-align:middle;
}
#pbtn{
  background:linear-gradient(90deg,#f9c846,#f97316);
  border:none;border-radius:10px;color:#111118;
  font-family:'Russo One',sans-serif;
  font-size:clamp(12px,3.5vw,15px);letter-spacing:0.18em;text-transform:uppercase;
  padding:13px 38px;cursor:pointer;
  -webkit-appearance:none;appearance:none;outline:none;touch-action:manipulation;
  box-shadow:0 4px 18px rgba(249,200,70,0.3);
  transition:transform 0.07s;margin-top:4px;
}
#pbtn:active{transform:scale(0.95)}
#share-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);border-radius:10px;color:#fff;font-family:'Syne',sans-serif;font-size:clamp(11px,3vw,13px);letter-spacing:0.15em;padding:10px 28px;cursor:pointer;-webkit-appearance:none;appearance:none;outline:none;touch-action:manipulation;display:none;margin-top:-4px;}
#share-toast{font-size:10px;color:#06d6a0;letter-spacing:0.15em;text-align:center;display:none;}
#ov-h{font-size:clamp(8px,2vw,10px);color:rgba(255,255,255,0.15);letter-spacing:0.2em;text-align:center}
</style>
</head>
<body>

<div id="header">
  <a href="index.html" id="back-btn">← HOME</a>
  <div id="title">BOLT</div>
  <div id="tagline">endless runner</div>
</div>

<div id="wrap">
  <canvas id="c"></canvas>
  <div id="ov">
    <div id="ov-t">BOLT</div>
    <div id="ov-m">SPACE / ↑ &nbsp;·&nbsp; CLICK BUTTON &nbsp;·&nbsp; TAP SCREEN</div>
    <button id="pbtn" type="button">PLAY</button>
    <button id="share-btn" type="button">📤 SHARE RESULT</button>
    <div id="share-toast">✅ COPIED!</div>
    <div id="ov-h">double jump · collect gems · survive</div>
  </div>
</div>

<div id="hud">
  <div class="hc" id="hc1"><div class="hl">score</div><span class="hv" id="sv">0</span></div>
  <div class="hc" id="hc2"><div class="hl">best</div><span class="hv" id="bv">0</span></div>
  <div class="hc" id="hc3"><div class="hl">level</div><span class="hv" id="lv">1</span></div>
</div>

<button id="jbtn" type="button">⚡ JUMP &nbsp;·&nbsp; SPACE / ↑</button>

<script>
(function(){
'use strict';

var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var W,H,GY;

function resize(){
  var r=document.getElementById('wrap').getBoundingClientRect();
  W=Math.round(r.width); H=Math.round(r.height);
  canvas.width=W; canvas.height=H;
  GY=Math.round(H*0.78);
  if(typeof py!=='undefined' && py>GY) py=GY;
}
window.addEventListener('resize',function(){resize();initP();});
resize();

/* ── COLOURS ── */
var BG='#0c0c14';
var YELLOW='#f9c846';
var ORANGE='#f97316';
var CYAN='#4cc9f0';
var RED='#f94060';
var WHITE='#ffffff';
var GNDCOL='#16161f';
var GNDLINE='rgba(249,200,70,0.35)';

/* ── STATE ── */
var gs='idle'; // idle | run | dead
var score=0,best=0,level=1,fr=0,spd=0,dflash=0;

/* ── STARS ── */
var stars=[];
function makeStars(){
  stars=[];
  for(var i=0;i<60;i++){
    stars.push({
      x:Math.random()*W, y:Math.random()*(GY*0.9),
      r:Math.random()*1.2+0.3,
      s:Math.random()*0.15+0.02,
      a:Math.random()*0.5+0.1,
      tw:Math.random()*Math.PI*2,
      ts:0.02+Math.random()*0.03
    });
  }
}
makeStars();
window.addEventListener('resize',makeStars);

/* ── PARTICLES ── */
var pts=[];
function burst(x,y,col,n){
  for(var i=0;i<n;i++){
    var a=Math.random()*Math.PI*2,s=1.2+Math.random()*4;
    pts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1.8,
      col:col,life:1,dec:0.035+Math.random()*0.04,r:1.5+Math.random()*3});
  }
}
function tickPts(){
  for(var i=pts.length-1;i>=0;i--){
    var p=pts[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.22;p.life-=p.dec;
    if(p.life<=0)pts.splice(i,1);
  }
}
function drawPts(){
  for(var i=0;i<pts.length;i++){
    var p=pts[i];
    ctx.save();
    ctx.globalAlpha=p.life*p.life;
    ctx.shadowColor=p.col;ctx.shadowBlur=6;
    ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

/* ── GEMS ── */
var gems=[],gemCD=80;
function spawnGem(){
  var ys=[GY-H*0.09,GY-H*0.24,GY-H*0.4];
  gems.push({x:W+10,y:ys[Math.floor(Math.random()*ys.length)],a:0,done:false});
}
function tickGems(){
  for(var i=0;i<gems.length;i++){gems[i].x-=spd*0.82;gems[i].a+=0.08;}
  gemCD--;
  if(gemCD<=0){spawnGem();gemCD=105+Math.floor(Math.random()*85);}
  var k=[];
  for(var i=0;i<gems.length;i++)if(gems[i].x>-18&&!gems[i].done)k.push(gems[i]);
  gems=k;
}
function drawGems(){
  var cr=Math.max(5,Math.round(W*0.011));
  for(var i=0;i<gems.length;i++){
    var g=gems[i],sc=1+0.12*Math.sin(g.a);
    ctx.save();
    ctx.translate(g.x,g.y);ctx.scale(sc,sc);
    /* diamond shape */
    ctx.beginPath();
    ctx.moveTo(0,-cr*1.4);ctx.lineTo(cr,-cr*0.2);
    ctx.lineTo(0,cr*1.4);ctx.lineTo(-cr,-cr*0.2);ctx.closePath();
    ctx.fillStyle=CYAN;
    ctx.shadowColor=CYAN;ctx.shadowBlur=14;
    ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.45)';
    ctx.beginPath();ctx.moveTo(0,-cr*1.4);ctx.lineTo(cr,-cr*0.2);ctx.lineTo(0,-cr*0.1);ctx.closePath();ctx.fill();
    ctx.restore();
  }
}
function collectGems(){
  var pr=pRect(),cr=Math.max(5,Math.round(W*0.011))+8;
  for(var i=0;i<gems.length;i++){
    var g=gems[i];
    if(!g.done){
      var dx=pr.x+pr.w/2-g.x,dy=pr.y+pr.h/2-g.y;
      if(dx*dx+dy*dy<(cr+pr.w/3)*(cr+pr.w/3)){
        g.done=true;score+=5;burst(g.x,g.y,CYAN,10);
      }
    }
  }
}

/* ── PLAYER ── */
var px,py,pvy=0,pj=0,pW,pH,pSq=1,pSqV=0,pTrail=[];

function initP(){
  pW=Math.max(16,Math.round(W*0.034));
  pH=Math.max(22,Math.round(H*0.13));
  px=Math.round(W*0.13);
  if(typeof py==='undefined'||py>GY)py=GY;
}
initP();

function jump(){
  if(gs==='run'&&pj<2){
    pvy=-(H*0.065);
    pj++;pSq=0.55;pSqV=0.09;
    burst(px,py+4,ORANGE,7);
  }
}
function tickP(){
  pvy+=H*0.0033;py+=pvy;
  if(py>=GY){py=GY;pvy=0;pj=0;}
  pSq+=(1-pSq)*0.22+pSqV;pSqV*=0.76;
  if(Math.abs(pSq-1)<0.002){pSq=1;pSqV=0;}
  pTrail.push({x:px,y:py,sq:pSq});
  if(pTrail.length>12)pTrail.shift();
}
function drawP(){
  /* trail */
  for(var i=0;i<pTrail.length;i++){
    var t=pTrail[i],a=(i/pTrail.length)*0.35;
    var tsw=pW*(2-t.sq)*0.65,tsh=pH*t.sq*0.65;
    ctx.save();ctx.globalAlpha=a;
    var tg=ctx.createLinearGradient(0,t.y-tsh,0,t.y);
    tg.addColorStop(0,YELLOW);tg.addColorStop(1,ORANGE);
    ctx.fillStyle=tg;
    ctx.fillRect(t.x-tsw/2,t.y-tsh+2,tsw,tsh);
    ctx.restore();
  }
  /* body */
  var sw=pW*(2-pSq),sh=pH*pSq;
  var dx=px-sw/2,dy=py-sh+2;
  ctx.save();
  var bg=ctx.createLinearGradient(dx,dy,dx+sw,dy+sh);
  bg.addColorStop(0,YELLOW);bg.addColorStop(1,ORANGE);
  ctx.fillStyle=bg;
  ctx.shadowColor=YELLOW;ctx.shadowBlur=18;
  ctx.fillRect(dx,dy,sw,sh);
  /* shine */
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.28)';
  ctx.fillRect(dx+2,dy+2,sw*0.38,sh*0.2);
  /* eye */
  ctx.fillStyle=BG;
  ctx.fillRect(dx+sw*0.55,dy+sh*0.2,sw*0.23,sh*0.2);
  ctx.restore();
}
function pRect(){return{x:px-pW/2+3,y:py-pH+4,w:pW-6,h:pH-5};}

/* ── OBSTACLES ── */
var obs=[],obsCD=0;
function spawnObs(){
  var ow=Math.max(14,Math.round(W*0.028));
  var roll=Math.random(),oh,gap;
  var col=Math.random()<0.5?RED:'#d946ef'; // red or magenta
  if(roll<0.55){
    oh=H*0.1+Math.random()*H*0.1;
    obs.push({x:W+14,y:GY-oh+2,w:ow,h:oh,col:col});
  } else if(roll<0.82){
    oh=H*0.06+Math.random()*H*0.05;gap=H*0.26+Math.random()*H*0.08;
    obs.push({x:W+14,y:GY-gap-oh,w:ow,h:oh,col:col});
  } else {
    obs.push({x:W+14,y:GY-H*0.1,w:ow,h:H*0.1,col:col});
    obs.push({x:W+14,y:GY-H*0.24,w:ow,h:H*0.08,col:col});
  }
}
function tickObs(){
  for(var i=0;i<obs.length;i++)obs[i].x-=spd;
  var k=[];for(var i=0;i<obs.length;i++)if(obs[i].x>-40)k.push(obs[i]);obs=k;
  obsCD--;
  if(obsCD<=0){
    spawnObs();
    var mg=Math.max(W*0.07,W*0.16-spd*7);
    obsCD=Math.floor(mg+Math.random()*W*0.07);
  }
}
function drawObs(){
  for(var i=0;i<obs.length;i++){
    var o=obs[i],r=5;
    ctx.save();
    ctx.shadowColor=o.col;ctx.shadowBlur=14;
    /* gradient fill */
    var og=ctx.createLinearGradient(o.x,o.y,o.x,o.y+o.h);
    og.addColorStop(0,'#fff');og.addColorStop(0.15,o.col);og.addColorStop(1,mixDark(o.col));
    ctx.fillStyle=og;
    rRect(ctx,o.x,o.y,o.w,o.h,r);ctx.fill();
    /* top highlight */
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.fillRect(o.x+2,o.y+2,o.w-4,3);
    ctx.restore();
  }
}
function mixDark(c){return c==='#f94060'?'#6b0020':'#5b006b';}
function rRect(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);
  c.closePath();
}

/* ── COLLISION ── */
function hit(){
  var pr=pRect();
  for(var i=0;i<obs.length;i++){
    var o=obs[i];
    if(pr.x<o.x+o.w&&pr.x+pr.w>o.x&&pr.y<o.y+o.h&&pr.y+pr.h>o.y)return true;
  }
  return false;
}

/* ── BACKGROUND ── */
/* scrolling city silhouette */
var bldgs=[];
function makeCity(){
  bldgs=[];
  var x=0;
  while(x<W+80){
    var w=20+Math.random()*40;
    bldgs.push({x:x,w:w,h:H*0.12+Math.random()*H*0.28});
    x+=w+2+Math.random()*10;
  }
}
makeCity();
window.addEventListener('resize',makeCity);
var cityOff=0;

function drawBg(){
  /* sky gradient */
  var sky=ctx.createLinearGradient(0,0,0,GY);
  sky.addColorStop(0,'#06060e');
  sky.addColorStop(0.5,'#0d0d1c');
  sky.addColorStop(1,'#140a2a');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

  /* stars */
  for(var i=0;i<stars.length;i++){
    var s=stars[i];
    s.tw+=s.ts;
    if(gs==='run')s.x-=s.s;
    if(s.x<0)s.x=W;
    var ta=s.a*(0.4+0.6*Math.abs(Math.sin(s.tw)));
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle='rgba(255,240,200,'+ta.toFixed(2)+')';ctx.fill();
  }

  /* city silhouette */
  if(gs==='run')cityOff=(cityOff+spd*0.25)%(W+80);
  ctx.fillStyle='rgba(15,10,35,0.9)';
  ctx.beginPath();ctx.moveTo(0,GY);
  for(var bi=0;bi<bldgs.length;bi++){
    var b=bldgs[bi];
    var bx=((b.x-cityOff)%(W+80)+W+80)%(W+80)-80;
    /* windows */
    ctx.fillRect(bx,GY-b.h,b.w,b.h);
  }
  /* windows glow on buildings */
  for(var bi=0;bi<bldgs.length;bi++){
    var b=bldgs[bi];
    var bx=((b.x-cityOff)%(W+80)+W+80)%(W+80)-80;
    if(bx>-80&&bx<W+20){
      for(var wy=GY-b.h+4;wy<GY-4;wy+=8){
        for(var wx=bx+3;wx<bx+b.w-3;wx+=6){
          if((Math.floor(bx/5+wy/3+bi))%3===0){
            ctx.fillStyle='rgba(249,200,70,0.25)';
            ctx.fillRect(wx,wy,3,4);
          }
        }
      }
    }
  }
}

function drawGround(){
  /* ground block */
  var gg=ctx.createLinearGradient(0,GY,0,H);
  gg.addColorStop(0,'#1a1030');gg.addColorStop(1,'#0c0818');
  ctx.fillStyle=gg;ctx.fillRect(0,GY+1,W,H-GY-1);
  /* lane dashes */
  var dw=Math.round(W/18),off=(fr*spd)%((dw*2));
  for(var i=0;i<20;i++){
    var dx=((i*dw*2)-off+W*2)%(W+dw*2);
    ctx.fillStyle='rgba(249,200,70,0.12)';
    ctx.fillRect(dx,GY+7,dw,4);
  }
  /* ground glow line */
  ctx.save();
  ctx.shadowColor=YELLOW;ctx.shadowBlur=10;
  ctx.strokeStyle=GNDLINE;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,GY+1);ctx.lineTo(W,GY+1);ctx.stroke();
  ctx.restore();
}

/* ── HUD ── */
function updHUD(){
  document.getElementById('sv').textContent=score;
  document.getElementById('bv').textContent=best;
  document.getElementById('lv').textContent=level;
}

/* ── OVERLAY ── */
function showOv(t,m,b){
  document.getElementById('ov-t').textContent=t;
  document.getElementById('ov-m').innerHTML=m;
  document.getElementById('pbtn').textContent=b;
  document.getElementById('ov').classList.remove('hidden');
}

/* ── LOOP ── */
function loop(){
  requestAnimationFrame(loop);
  fr++;

  if(gs==='run'){
    score++;
    level=Math.floor(score/500)+1;
    spd=5.5+(level-1)*0.9;
    if(score>best)best=score;
    updHUD();
    tickP();tickObs();tickGems();tickPts();
    collectGems();
    if(hit()){
      gs='dead';dflash=10;
      burst(px,py,RED,14);burst(px,py,ORANGE,10);
      var fs=score;
      setTimeout(function(){
        showOv('GAME OVER','SCORE &nbsp;<span class="big">'+fs+'</span>','RETRY');
        var sb=document.getElementById('share-btn');sb.style.display='block';
        sb.onclick=function(){var txt='⚡ BOLT\nScore: '+fs+'\nPlay at boltgame.netlify.app';if(navigator.share){navigator.share({text:txt});}else{navigator.clipboard.writeText(txt).then(function(){var t=document.getElementById('share-toast');t.style.display='block';setTimeout(function(){t.style.display='none';},2000);});}}
      },420);
    }
  } else {
    tickPts();
  }

  drawBg();
  drawGround();
  drawGems();
  drawObs();
  drawP();
  drawPts();

  /* death flash */
  if(dflash>0){
    ctx.fillStyle='rgba(249,64,96,'+(dflash*0.055)+')';
    ctx.fillRect(0,0,W,H);dflash--;
  }

  /* level badge */
  if(gs==='run'&&level>1){
    ctx.save();
    ctx.font='600 '+Math.round(H*0.065)+'px Russo One, sans-serif';
    ctx.fillStyle='rgba(76,201,240,0.5)';
    ctx.fillText('LVL '+level,W-Math.round(W*0.16),Math.round(H*0.1));
    ctx.restore();
  }
}

/* ── START ── */
function startGame(){
  score=0;level=1;spd=5.5;fr=0;
  obs=[];obsCD=55;gems=[];gemCD=80;pts=[];
  cityOff=0;
  initP();pvy=0;pj=0;pTrail=[];pSq=1;pSqV=0;
  dflash=0;
  gs='run';
  document.getElementById('share-btn').style.display='none';
  document.getElementById('share-toast').style.display='none';
  document.getElementById('ov').classList.add('hidden');
  updHUD();
}

/* ── CONTROLS ── */
var jb=document.getElementById('jbtn');
jb.addEventListener('touchstart',function(e){e.preventDefault();jump();},{passive:false});
jb.addEventListener('mousedown',function(e){e.preventDefault();jump();});
canvas.addEventListener('touchstart',function(e){e.preventDefault();jump();},{passive:false});
canvas.addEventListener('mousedown',function(e){e.preventDefault();jump();});
document.addEventListener('keydown',function(e){
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();jump();}
});
var pb=document.getElementById('pbtn');
pb.addEventListener('touchend',function(e){e.preventDefault();startGame();});
pb.addEventListener('click',function(){startGame();});

showOv('BOLT','SPACE / ↑ &nbsp;·&nbsp; CLICK BUTTON &nbsp;·&nbsp; TAP SCREEN','PLAY');
updHUD();loop();
}());
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>DISTANCE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Nunito:wght@700;900&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;}
body{display:flex;flex-direction:column;align-items:center;justify-content:space-between;touch-action:pan-y;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;font-family:'Nunito',sans-serif;color:#fff;background:#0a0f14;padding:env(safe-area-inset-top,6px) 0 env(safe-area-inset-bottom,6px);height:100vh;height:100dvh;}
#header{flex-shrink:0;width:min(96vw,500px);display:flex;align-items:center;justify-content:space-between;padding:2px 6px 0;}
#back{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.3);text-decoration:none;min-width:50px;font-weight:700;}
#hdc{text-align:center;}
#title{font-family:'Russo One',sans-serif;font-size:clamp(16px,4.5vw,22px);letter-spacing:0.1em;background:linear-gradient(90deg,#06b6d4,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#tagline{font-size:8px;color:rgba(255,255,255,0.2);letter-spacing:0.25em;text-transform:uppercase;}
#hdr{min-width:50px;text-align:right;}
#lives-disp{font-size:18px;letter-spacing:2px;}
#game-area{flex:1 1 auto;width:min(96vw,500px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:4px 8px;min-height:0;}
#progress-bar{width:100%;height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;flex-shrink:0;}
#progress-fill{height:100%;background:linear-gradient(90deg,#06b6d4,#3b82f6);border-radius:3px;transition:width 0.4s;}
#round-label{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:0.2em;text-transform:uppercase;text-align:right;width:100%;}
#dist-card{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0;}
#place-a{font-family:'Russo One',sans-serif;font-size:clamp(16px,4.5vw,22px);text-align:center;color:#06b6d4;}
#arrow-div{font-size:24px;color:rgba(255,255,255,0.3);}
#place-b{font-family:'Russo One',sans-serif;font-size:clamp(16px,4.5vw,22px);text-align:center;color:#3b82f6;}
#dist-hint{font-size:clamp(9px,2.2vw,11px);color:rgba(255,200,80,0.5);letter-spacing:0.1em;text-align:center;font-style:italic;margin-top:2px;}
#dist-display{font-family:'Russo One',sans-serif;font-size:clamp(28px,8vw,46px);letter-spacing:0.05em;color:#06b6d4;text-shadow:0 0 20px rgba(6,182,212,0.4);text-align:center;flex-shrink:0;}
#slider-wrap{width:100%;flex-shrink:0;}
#dist-slider{width:100%;-webkit-appearance:none;appearance:none;height:8px;border-radius:4px;background:rgba(255,255,255,0.1);outline:none;cursor:pointer;}
#dist-slider::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#06b6d4,#3b82f6);box-shadow:0 0 12px rgba(6,182,212,0.5);cursor:pointer;}
#dist-slider::-moz-range-thumb{width:28px;height:28px;border-radius:50%;border:none;background:linear-gradient(135deg,#06b6d4,#3b82f6);cursor:pointer;}
#slider-labels{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,0.25);margin-top:4px;padding:0 2px;}
#submit-btn{width:100%;padding:14px 0;flex-shrink:0;background:linear-gradient(90deg,#06b6d4,#3b82f6);border:none;border-radius:12px;color:#fff;font-family:'Russo One',sans-serif;font-size:clamp(14px,4vw,17px);letter-spacing:0.15em;cursor:pointer;-webkit-appearance:none;appearance:none;outline:none;touch-action:manipulation;box-shadow:0 4px 20px rgba(6,182,212,0.35);transition:transform 0.07s,opacity 0.15s;}
#submit-btn:active{transform:scale(0.97);}
#submit-btn:disabled{opacity:0.4;pointer-events:none;}
#result-panel{width:100%;background:rgba(255,255,255,0.04);border-radius:12px;padding:14px;text-align:center;flex-shrink:0;display:none;}
#result-title{font-family:'Russo One',sans-serif;font-size:clamp(18px,5.5vw,26px);letter-spacing:0.1em;margin-bottom:4px;}
#result-detail{font-size:clamp(11px,3vw,13px);color:rgba(255,255,255,0.5);letter-spacing:0.1em;line-height:1.6;}
#result-pts{font-family:'Russo One',sans-serif;font-size:clamp(16px,4.5vw,22px);margin-top:6px;}
#next-btn{margin-top:10px;width:100%;padding:12px 0;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:#fff;font-family:'Russo One',sans-serif;font-size:clamp(12px,3.5vw,15px);letter-spacing:0.15em;cursor:pointer;-webkit-appearance:none;appearance:none;outline:none;touch-action:manipulation;}
#ov{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(4,8,14,0.96);transition:opacity 0.25s;pointer-events:auto;padding:20px;}
#ov.hidden{opacity:0;pointer-events:none;}
#ov-emoji{font-size:clamp(40px,12vw,60px);}
#ov-title{font-family:'Russo One',sans-serif;font-size:clamp(24px,7vw,40px);letter-spacing:0.1em;background:linear-gradient(90deg,#06b6d4,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;}
#ov-sub{font-size:clamp(11px,3vw,14px);color:rgba(255,255,255,0.38);letter-spacing:0.08em;text-align:center;padding:0 16px;line-height:1.7;font-weight:700;}
#ov-sub .big{font-family:'Russo One',sans-serif;font-size:clamp(20px,5.5vw,28px);color:#06b6d4;-webkit-text-fill-color:#06b6d4;vertical-align:middle;}
#ov-play{background:linear-gradient(90deg,#06b6d4,#3b82f6);border:none;border-radius:12px;color:#fff;font-family:'Russo One',sans-serif;font-size:clamp(14px,4vw,17px);letter-spacing:0.15em;padding:13px 44px;cursor:pointer;-webkit-appearance:none;appearance:none;outline:none;touch-action:manipulation;box-shadow:0 4px 22px rgba(6,182,212,0.4);transition:transform 0.07s;}
#ov-play:active{transform:scale(0.95);}
#ov-share{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);border-radius:10px;color:#fff;font-family:'Russo One',sans-serif;font-size:clamp(12px,3.2vw,14px);letter-spacing:0.15em;padding:11px 32px;cursor:pointer;-webkit-appearance:none;appearance:none;outline:none;display:none;}
#ov-copy{font-size:11px;color:#06d6a0;letter-spacing:0.15em;display:none;}
</style>
</head>
<body>
<div id="header">
  <a id="back" href="index.html">← ARCADE</a>
  <div id="hdc"><div id="title">🌍 DISTANCE</div><div id="tagline">guess the miles</div></div>
  <div id="hdr"><div id="lives-disp">❤️❤️❤️</div></div>
</div>
<div id="game-area">
  <div id="round-label">ROUND 1 / 10</div>
  <div id="progress-bar"><div id="progress-fill" style="width:10%"></div></div>
  <div id="dist-card">
    <div id="place-a">New York</div>
    <div id="arrow-div">✈️ →</div>
    <div id="place-b">Los Angeles</div>
    <div id="dist-hint"></div>
  </div>
  <div id="dist-display">0 mi</div>
  <div id="slider-wrap">
    <input type="range" id="dist-slider" min="0" max="100" value="25" step="1">
    <div id="slider-labels"><span>0</span><span id="sl-max">10,000 mi</span></div>
  </div>
  <button id="submit-btn" type="button">🌍 SUBMIT GUESS</button>
  <div id="result-panel">
    <div id="result-title"></div>
    <div id="result-detail"></div>
    <div id="result-pts"></div>
    <button id="next-btn" type="button">NEXT →</button>
  </div>
</div>
<div id="ov">
  <div id="ov-emoji">🌍</div>
  <div id="ov-title">DISTANCE</div>
  <div id="ov-sub">TWO PLACES ARE SHOWN<br>GUESS THE DISTANCE IN MILES<br>10 ROUNDS · 3 LIVES</div>
  <button id="ov-play" type="button">▶ START</button>
  <button id="ov-share" type="button">📤 SHARE RESULT</button>
  <div id="ov-copy">✅ COPIED!</div>
</div>
<script>
(function(){
'use strict';
function fmtMi(n){if(n>=1000)return Math.round(n/100)*100+' mi';return n+' mi';}
var DISTANCES=[
  {a:'New York City 🗽',b:'Los Angeles 🌴',dist:2800,max:6000,hint:'Coast to coast USA'},
  {a:'New York City 🗽',b:'London 🇬🇧',dist:3459,max:8000,hint:'Across the Atlantic'},
  {a:'Los Angeles 🌴',b:'Tokyo 🗼',dist:5479,max:12000,hint:'Pacific crossing'},
  {a:'Miami 🌊',b:'Chicago 🏙️',dist:1377,max:3000,hint:'Both in eastern US'},
  {a:'London 🇬🇧',b:'Sydney 🦘',dist:10573,max:15000,hint:'Very far apart'},
  {a:'New York City 🗽',b:'Miami 🌊',dist:1281,max:3000,hint:'Both on East Coast'},
  {a:'Chicago 🏙️',b:'Houston 🤠',dist:1082,max:2500,hint:'Midwest to South'},
  {a:'Paris 🗼',b:'Dubai 🏙️',dist:3258,max:7000,hint:'Europe to Middle East'},
  {a:'New York City 🗽',b:'Toronto 🍁',dist:342,max:1000,hint:'Very close neighbors'},
  {a:'Los Angeles 🌴',b:'London 🇬🇧',dist:5456,max:12000,hint:'Two major cities'},
  {a:'Sydney 🦘',b:'Tokyo 🗼',dist:4863,max:10000,hint:'Asia-Pacific'},
  {a:'Dubai 🏙️',b:'Singapore 🦁',dist:3649,max:8000,hint:'Middle East to SE Asia'},
  {a:'Moscow ❄️',b:'Beijing 🐉',dist:3613,max:8000,hint:'Two big capitals'},
  {a:'São Paulo 🇧🇷',b:'New York City 🗽',dist:4766,max:10000,hint:'Americas'},
  {a:'Cairo 🏺',b:'Mumbai 🇮🇳',dist:2760,max:6000,hint:'Africa to South Asia'},
  {a:'Seattle ☕',b:'New York City 🗽',dist:2852,max:6000,hint:'West to East US'},
  {a:'Honolulu 🌺',b:'Los Angeles 🌴',dist:2556,max:6000,hint:'Hawaii to mainland'},
  {a:'Dallas 🤠',b:'Chicago 🏙️',dist:921,max:2000,hint:'Central US'},
  {a:'Berlin 🇩🇪',b:'Rome 🍕',dist:1185,max:3000,hint:'Northern to Southern Europe'},
  {a:'Toronto 🍁',b:'Vancouver 🍁',dist:2700,max:6000,hint:'East to West Canada'},
];
var lives=3,score=0,round=1,totalRounds=10,gs='idle',currentDist=null,usedIdx=[],answered=false;
var slider=document.getElementById('dist-slider');
var distDisplay=document.getElementById('dist-display');
var currentMax=10000;
function sliderToMi(pct){return Math.round(currentMax*Math.pow(pct/100,1.7));}
function updateDisplay(){distDisplay.textContent=fmtMi(sliderToMi(parseFloat(slider.value)));}
slider.addEventListener('input',updateDisplay);
function setupSlider(item){
  currentMax=item.max;slider.value=25;
  document.getElementById('sl-max').textContent=fmtMi(item.max);
  updateDisplay();
}
function updLives(){var h='';for(var i=0;i<3;i++)h+=(i<lives?'❤️':'🖤');document.getElementById('lives-disp').textContent=h;}
function loadDist(){
  answered=false;
  var pool=[];for(var i=0;i<DISTANCES.length;i++)if(usedIdx.indexOf(i)===-1)pool.push(i);
  if(pool.length===0){usedIdx=[];pool=DISTANCES.map(function(_,i){return i;});}
  var idx=pool[Math.floor(Math.random()*pool.length)];usedIdx.push(idx);
  currentDist=DISTANCES[idx];
  document.getElementById('place-a').textContent=currentDist.a;
  document.getElementById('place-b').textContent=currentDist.b;
  document.getElementById('dist-hint').textContent='💡 '+currentDist.hint;
  document.getElementById('round-label').textContent='ROUND '+round+' / '+totalRounds;
  document.getElementById('progress-fill').style.width=((round-1)/totalRounds*100)+'%';
  setupSlider(currentDist);
  document.getElementById('submit-btn').style.display='block';
  document.getElementById('submit-btn').disabled=false;
  document.getElementById('result-panel').style.display='none';
}
document.getElementById('submit-btn').addEventListener('click',function(){
  if(answered||!currentDist||gs!=='run')return;
  answered=true;document.getElementById('submit-btn').disabled=true;
  var guess=sliderToMi(parseFloat(slider.value));
  var actual=currentDist.dist;
  var pct=Math.abs(guess-actual)/actual;
  var over=guess>actual*1.6;
  var pts=0,grade='',gradeCol='#fff';
  if(pct<=0.05){pts=500;grade='EXACT! 🎯';gradeCol='#06b6d4';}
  else if(pct<=0.15){pts=350;grade='SO CLOSE! 🔥';gradeCol='#3b82f6';}
  else if(pct<=0.30){pts=200;grade='NICE! 👍';gradeCol='#63caff';}
  else if(pct<=0.55){pts=75;grade='NOT BAD';gradeCol='#a78bfa';}
  else if(over){pts=0;grade='WAY TOO FAR ❌';gradeCol='#ef4444';lives--;updLives();}
  else{pts=20;grade='WAY OFF';gradeCol='rgba(255,255,255,0.4)';}
  score+=pts;
  var panel=document.getElementById('result-panel');panel.style.display='block';
  var rt=document.getElementById('result-title');rt.textContent=grade;rt.style.color=gradeCol;
  var diffMi=Math.abs(guess-actual);
  document.getElementById('result-detail').textContent='Actual: '+fmtMi(actual)+'  ·  Your guess: '+fmtMi(guess)+'\nOff by: '+fmtMi(diffMi);
  var ptsEl=document.getElementById('result-pts');ptsEl.textContent=pts>0?'+'+pts+' pts':'No points';ptsEl.style.color=pts>0?'#06b6d4':'#ef4444';
  if(lives<=0){setTimeout(endGame,1200);}else if(round>=totalRounds){setTimeout(endGame,1200);}
});
document.getElementById('next-btn').addEventListener('click',function(){
  if(lives<=0||round>=totalRounds){endGame();return;}
  round++;loadDist();
});
function endGame(){
  gs='done';var won=lives>0;
  document.getElementById('ov-emoji').textContent=won?'🏆':'🌍';
  document.getElementById('ov-title').textContent=won?'WORLD TRAVELER!':'LOST ON THE MAP!';
  document.getElementById('ov-sub').innerHTML='SCORE &nbsp;<span class="big">'+score+'</span><br>'+(won?'You know your geography!':'Brush up on the map!');
  document.getElementById('ov-play').textContent='PLAY AGAIN';
  var sb=document.getElementById('ov-share');sb.style.display='block';
  sb.onclick=function(){
    var txt='🌍 DISTANCE\nScore: '+score+'\nPlay at boltgame.netlify.app';
    if(navigator.share){navigator.share({text:txt});}
    else{navigator.clipboard.writeText(txt).then(function(){var t=document.getElementById('ov-copy');t.style.display='block';setTimeout(function(){t.style.display='none';},2000);});}
  };
  document.getElementById('ov').classList.remove('hidden');
}
function startGame(){
  lives=3;score=0;round=1;usedIdx=[];answered=false;gs='run';
  updLives();document.getElementById('ov-share').style.display='none';document.getElementById('ov-copy').style.display='none';
  document.getElementById('ov').classList.add('hidden');loadDist();
}
document.getElementById('ov-play').addEventListener('click',startGame);
document.getElementById('ov-play').addEventListener('touchend',function(e){e.preventDefault();startGame();});
}());
</script>
</body>
</html>

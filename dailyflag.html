<style>
@import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;500;600;700&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{min-height:100vh;background:#08080f;font-family:'Inter',sans-serif;color:#fff;overflow-x:hidden;display:flex;flex-direction:column;align-items:center;}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;}
#page{position:relative;z-index:1;width:100%;max-width:480px;padding:0 20px 60px;display:flex;flex-direction:column;min-height:100vh;}
header{display:flex;align-items:center;justify-content:space-between;padding:20px 0 0;}
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.35);text-decoration:none;transition:color 0.2s;}
.back-btn:hover{color:rgba(255,255,255,0.7);}
.back-btn svg{width:16px;height:16px;}
.header-logo{font-family:'Russo One',sans-serif;font-size:13px;letter-spacing:0.22em;background:linear-gradient(90deg,#f9c846,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.daily-badge{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:4px 10px;}
.game-title{font-family:'Russo One',sans-serif;font-size:clamp(28px,8vw,42px);letter-spacing:0.1em;text-align:center;margin:28px 0 4px;background:linear-gradient(160deg,#f9c846,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.game-sub{text-align:center;font-size:12px;letter-spacing:0.25em;text-transform:uppercase;color:rgba(255,255,255,0.2);margin-bottom:24px;}
.streak-bar{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:20px;font-size:13px;color:rgba(255,255,255,0.3);letter-spacing:0.1em;}
.streak-num{font-family:'Russo One',sans-serif;font-size:18px;background:linear-gradient(90deg,#f9c846,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.flag-wrap{width:100%;aspect-ratio:3/2;border-radius:16px;overflow:hidden;border:2px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:clamp(80px,25vw,140px);background:#0e0e1a;margin-bottom:16px;box-shadow:0 0 40px rgba(249,200,70,0.08);}
.flag-emoji{transition:filter 0.4s,transform 0.4s;user-select:none;pointer-events:none;}
.guess-count{text-align:center;font-size:12px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.25);margin-bottom:14px;}
.guess-count span{font-family:'Russo One',sans-serif;font-size:16px;color:rgba(249,200,70,0.7);}
.hints-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.hint-chip{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;padding:6px 12px;border-radius:20px;background:rgba(249,200,70,0.08);border:1px solid rgba(249,200,70,0.15);color:rgba(249,200,70,0.6);}
.guess-history{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;max-height:160px;overflow-y:auto;}
.guess-row{display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:10px;font-size:14px;font-weight:600;animation:slideIn 0.2s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.guess-row.wrong{background:rgba(249,64,96,0.1);border:1px solid rgba(249,64,96,0.2);color:#f94060;}
.guess-row.correct{background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.25);color:#22c55e;}
.input-wrap{position:relative;margin-bottom:12px;}
#guess-input{width:100%;background:#0e0e1a;border:2px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 16px;font-size:15px;font-family:'Inter',sans-serif;color:#fff;outline:none;transition:border-color 0.2s;}

.autocomplete.show{display:block;}
.auto-item{padding:12px 16px;font-size:14px;cursor:pointer;transition:background 0.15s;display:flex;align-items:center;gap:10px;}
.auto-item:hover,.auto-item.selected{background:rgba(249,200,70,0.08);}
.auto-flag{font-size:20px;}
#submit-btn{width:100%;padding:15px;background:linear-gradient(90deg,#f9c846,#f97316);border:none;border-radius:12px;font-family:'Russo One',sans-serif;font-size:15px;letter-spacing:0.15em;color:#08080f;cursor:pointer;transition:opacity 0.2s,transform 0.1s;}

.result-emoji{font-size:72px;margin-bottom:16px;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);}

function drawBg(){bgX.clearRect(0,0,bgC.width,bgC.height);stars.forEach(s=>{s.a+=s.s;if(s.a>1||s.a<0)s.s*=-1;bgX.globalAlpha=s.a*0.4;bgX.fillStyle='#f9c846';bgX.beginPath();bgX.arc(s.x,s.y,s.r,0,Math.PI*2);bgX.fill();});bgX.globalAlpha=1;requestAnimationFrame(drawBg);}

function getESTDateKey(){
  // Get current date in EST (UTC-5) / EDT (UTC-4)
  const now = new Date();
  const estOffset = -5 * 60; // EST base offset in minutes
  const isDST = (function(){
    const jan = new Date(now.getFullYear(), 0, 1).getTimezoneOffset();
    const jul = new Date(now.getFullYear(), 6, 1).getTimezoneOffset();
    const stdOffset = Math.max(jan, jul);
    return now.getTimezoneOffset() < stdOffset;
  })();
  const offsetMin = estOffset + (isDST ? 60 : 0);
  const estTime = new Date(now.getTime() + (now.getTimezoneOffset() + offsetMin) * 60000);
  return estTime.toISOString().slice(0, 10);
}
function getDayIndex(){
  const start = new Date('2024-01-01');
  const dateKey = getESTDateKey();
  const now = new Date(dateKey);
  const diff = Math.floor((now - start) / (1000 * 60 * 60 * 24));
  return diff % COUNTRIES.length;
}
const today=COUNTRIES[getDayIndex()];
const dateKey=getESTDateKey();
const storageKey=`dailyflag_${dateKey}`;

const HINTS=[
  {label:`Continent: ${today.continent}`,show:0},
  {label:`Capital starts with: ${today.capital[0]}`,show:3},
  {label:`Capital: ${today.capital}`,show:6},
];

let guesses=[],gameOver=false,won=false;
const saved=localStorage.getItem(storageKey);
if(saved){const s=JSON.parse(saved);guesses=s.guesses||[];gameOver=s.gameOver||false;won=s.won||false;}

function getStreak(){return parseInt(localStorage.getItem('dailyflag_streak')||'0');}
function updateStreak(w){
  const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
  const yk=yesterday.toISOString().slice(0,10); // yesterday in local, close enough
  const lastWin=localStorage.getItem('dailyflag_lastwin');
  let streak=getStreak();
  if(w){
    if(lastWin===yk)streak++;
    else if(lastWin===dateKey){}
    else streak=1;
    localStorage.setItem('dailyflag_lastwin',dateKey);
    localStorage.setItem('dailyflag_streak',streak);
  } else {
    localStorage.setItem('dailyflag_streak','0');
  }
  return streak;
}
document.getElementById('streak-display').textContent=getStreak();

function renderHints(){
  document.getElementById('hints-row').innerHTML=HINTS.filter(h=>guesses.length>=h.show).map(h=>`<div class="hint-chip">${h.label}</div>`).join('');
}
function renderGuesses(){
  document.getElementById('guess-history').innerHTML=guesses.map(g=>`<div class="guess-row ${g.correct?'correct':'wrong'}">${g.correct?'✅':'❌'} ${g.name}</div>`).join('');
  document.getElementById('guess-count-num').textContent=guesses.length;
}
function renderFlag(){
  document.getElementById('flag-emoji').textContent=today.flag;
  const wrongCount=guesses.filter(g=>!g.correct).length;
  const blurPx=Math.max(0,16-wrongCount*2);
  document.getElementById('flag-emoji').style.filter=blurPx>0?`blur(${blurPx}px)`:'';
  document.getElementById('flag-emoji').style.transform=blurPx>0?'scale(1.1)':'scale(1)';
}
function saveState(){localStorage.setItem(storageKey,JSON.stringify({guesses,gameOver,won}));}

function showResult(){
  const overlay=document.getElementById('result-overlay');
  document.getElementById('result-emoji').textContent=won?'🎉':'🏳️';
  document.getElementById('result-label').textContent=won?'CORRECT!':'GAVE UP';
  document.getElementById('result-label').className=`result-label ${won?'win':'lose'}`;
  document.getElementById('result-flag-big').textContent=today.flag;
  document.getElementById('result-country').textContent=today.name;
  if(won){
    document.getElementById('result-guesses').textContent=guesses.length;
    document.getElementById('result-guesses-label').textContent=guesses.length===1?'GUESS':'GUESSES';
  } else {
    document.getElementById('result-guesses').textContent='—';
    document.getElementById('result-guesses-label').textContent='BETTER LUCK TOMORROW';
  }
  const streak=updateStreak(won);
  document.getElementById('comeback-txt').textContent=won?`🔥 ${streak} day streak!`:'Come back tomorrow for a new flag';
  overlay.classList.add('show');
}

function render(){
  renderHints();renderGuesses();renderFlag();
  if(gameOver)setTimeout(showResult,600);
}

const input=document.getElementById('guess-input'),ac=document.getElementById('autocomplete');
let acSel=-1;
input.addEventListener('input',()=>{
  const val=input.value.trim().toLowerCase();
  if(!val){ac.classList.remove('show');return;}
  const matches=COUNTRIES.filter(c=>c.name.toLowerCase().startsWith(val)).slice(0,6);
  if(!matches.length){ac.classList.remove('show');return;}
  ac.innerHTML=matches.map(c=>`<div class="auto-item" data-name="${c.name}"><span class="auto-flag">${c.flag}</span>${c.name}</div>`).join('');
  ac.classList.add('show');acSel=-1;
  ac.querySelectorAll('.auto-item').forEach(item=>{item.addEventListener('click',()=>{input.value=item.dataset.name;ac.classList.remove('show');submitGuess();});});
});
input.addEventListener('keydown',e=>{
  const items=ac.querySelectorAll('.auto-item');
  if(e.key==='ArrowDown'){e.preventDefault();acSel=Math.min(acSel+1,items.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();acSel=Math.max(acSel-1,-1);}
  else if(e.key==='Enter'){e.preventDefault();if(acSel>=0&&items[acSel]){input.value=items[acSel].dataset.name;ac.classList.remove('show');submitGuess();return;}submitGuess();return;}
  items.forEach((it,i)=>it.classList.toggle('selected',i===acSel));
});
document.addEventListener('click',e=>{if(!e.target.closest('.input-wrap'))ac.classList.remove('show');});

function submitGuess(){
  if(gameOver)return;
  const val=input.value.trim();
  if(!val)return;
  const match=COUNTRIES.find(c=>c.name.toLowerCase()===val.toLowerCase());
  if(!match){input.style.borderColor='#f94060';setTimeout(()=>input.style.borderColor='',600);return;}
  input.value='';ac.classList.remove('show');
  const correct=match.name===today.name;
  guesses.push({name:match.name,correct});
  if(correct){won=true;gameOver=true;}
  saveState();render();
}

document.getElementById('submit-btn').addEventListener('click',submitGuess);
document.getElementById('giveup-btn').addEventListener('click',()=>{
  if(gameOver)return;
  gameOver=true;won=false;
  saveState();render();
});

document.getElementById('share-btn').addEventListener('click',()=>{
  const squares=guesses.map(g=>g.correct?'🟩':'🟥').join('');
  const n=guesses.length;
  const text=won
    ?`🏳️ DAILY FLAG\n${squares}\nGot it in ${n} ${n===1?'guess':'guesses'}!\nPlay at boltgame.netlify.app`
    :`🏳️ DAILY FLAG\n${squares}\nGave up on ${today.name} 😤\nPlay at boltgame.netlify.app`;
  if(navigator.share)navigator.share({text});
  else navigator.clipboard.writeText(text).then(()=>alert('Copied!'));
});

render();
</script>
</body>
</html>

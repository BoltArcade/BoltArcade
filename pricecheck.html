<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>PRICE CHECK</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Nunito:wght@700;900&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;}
body{
  display:flex;flex-direction:column;align-items:center;
  justify-content:space-between;
  touch-action:pan-y;
  -webkit-user-select:none;user-select:none;
  -webkit-tap-highlight-color:transparent;
  font-family:'Nunito',sans-serif;color:#fff;
  background:#0a0a14;
  padding:env(safe-area-inset-top,6px) 0 env(safe-area-inset-bottom,6px);
  height:100vh;height:100dvh;
}

/* HEADER */
#header{
  flex-shrink:0;width:min(96vw,500px);
  display:flex;align-items:center;justify-content:space-between;
  padding:2px 6px 0;
}
#back{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.28);text-decoration:none;min-width:50px;font-weight:700;}
#back:hover{color:rgba(255,255,255,0.6);}
#hdc{text-align:center;}
#title{font-family:'Russo One',sans-serif;font-size:clamp(18px,5vw,26px);letter-spacing:0.12em;background:linear-gradient(90deg,#f9c846,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#tagline{font-size:8px;color:rgba(255,255,255,0.2);letter-spacing:0.25em;text-transform:uppercase;margin-top:1px;}
#hdr{min-width:50px;text-align:right;}
#lives-disp{font-size:18px;letter-spacing:2px;}

/* MAIN CARD */
#game-area{
  flex:1 1 auto;
  width:min(96vw,500px);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:10px;
  padding:4px 8px;
  min-height:0;
}

/* PROGRESS */
#progress-bar{
  width:100%;height:6px;
  background:rgba(255,255,255,0.08);
  border-radius:3px;overflow:hidden;
  flex-shrink:0;
}
#progress-fill{
  height:100%;
  background:linear-gradient(90deg,#f9c846,#f97316);
  border-radius:3px;
  transition:width 0.4s;
}
#round-label{
  font-size:10px;color:rgba(255,255,255,0.3);
  letter-spacing:0.2em;text-transform:uppercase;
  text-align:right;width:100%;
}

/* ITEM CARD */
#item-card{
  width:100%;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:16px;
  padding:16px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  flex-shrink:0;
}
#item-emoji{font-size:clamp(48px,14vw,72px);line-height:1;text-align:center;}
#item-name{
  font-family:'Russo One',sans-serif;
  font-size:clamp(15px,4.5vw,20px);
  letter-spacing:0.08em;text-align:center;color:#fff;
}
#item-desc{
  font-size:clamp(10px,2.8vw,12px);
  color:rgba(255,255,255,0.35);
  letter-spacing:0.08em;text-align:center;
}
#item-hint{
  font-size:clamp(9px,2.2vw,11px);
  color:rgba(255,200,80,0.5);
  letter-spacing:0.1em;text-align:center;
  font-style:italic;
}

/* PRICE DISPLAY */
#price-display{
  font-family:'Russo One',sans-serif;
  font-size:clamp(32px,9vw,52px);
  letter-spacing:0.05em;
  color:#f9c846;
  text-shadow:0 0 20px rgba(249,200,70,0.4);
  text-align:center;
  flex-shrink:0;
}

/* SLIDER */
#slider-wrap{width:100%;flex-shrink:0;}
#price-slider{
  width:100%;
  -webkit-appearance:none;appearance:none;
  height:8px;
  border-radius:4px;
  background:rgba(255,255,255,0.1);
  outline:none;
  cursor:pointer;
}
#price-slider::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:28px;height:28px;
  border-radius:50%;
  background:linear-gradient(135deg,#f9c846,#f97316);
  box-shadow:0 0 12px rgba(249,200,70,0.5);
  cursor:pointer;
}
#price-slider::-moz-range-thumb{
  width:28px;height:28px;border-radius:50%;border:none;
  background:linear-gradient(135deg,#f9c846,#f97316);
  box-shadow:0 0 12px rgba(249,200,70,0.5);cursor:pointer;
}
#slider-labels{
  display:flex;justify-content:space-between;
  font-size:10px;color:rgba(255,255,255,0.25);
  letter-spacing:0.1em;margin-top:4px;
  padding:0 2px;
}

/* SUBMIT BUTTON */
#submit-btn{
  width:100%;padding:14px 0;flex-shrink:0;
  background:linear-gradient(90deg,#f9c846,#f97316);
  border:none;border-radius:12px;color:#1a0800;
  font-family:'Russo One',sans-serif;
  font-size:clamp(14px,4vw,17px);letter-spacing:0.15em;
  cursor:pointer;-webkit-appearance:none;appearance:none;outline:none;
  touch-action:manipulation;
  box-shadow:0 4px 20px rgba(249,200,70,0.35);
  transition:transform 0.07s,opacity 0.15s;
}
#submit-btn:active{transform:scale(0.97);}
#submit-btn:disabled{opacity:0.4;pointer-events:none;}

/* RESULT PANEL */
#result-panel{
  width:100%;
  background:rgba(255,255,255,0.04);
  border-radius:12px;
  padding:14px;
  text-align:center;
  flex-shrink:0;
  display:none;
}
#result-title{
  font-family:'Russo One',sans-serif;
  font-size:clamp(20px,6vw,28px);
  letter-spacing:0.1em;
  margin-bottom:4px;
}
#result-detail{
  font-size:clamp(11px,3vw,13px);
  color:rgba(255,255,255,0.5);
  letter-spacing:0.1em;
  line-height:1.6;
}
#result-pts{
  font-family:'Russo One',sans-serif;
  font-size:clamp(16px,4.5vw,22px);
  margin-top:6px;
}
#next-btn{
  margin-top:10px;width:100%;padding:12px 0;
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
  border-radius:10px;color:#fff;
  font-family:'Russo One',sans-serif;
  font-size:clamp(12px,3.5vw,15px);letter-spacing:0.15em;
  cursor:pointer;-webkit-appearance:none;appearance:none;outline:none;
  touch-action:manipulation;transition:background 0.12s;
}
#next-btn:hover{background:rgba(255,255,255,0.14);}

/* OVERLAY */
#ov{
  position:fixed;inset:0;z-index:50;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:rgba(5,5,12,0.96);
  transition:opacity 0.25s;pointer-events:auto;
}
#ov.hidden{opacity:0;pointer-events:none;}
#ov-emoji{font-size:clamp(40px,12vw,64px);}
#ov-title{font-family:'Russo One',sans-serif;font-size:clamp(26px,8vw,46px);letter-spacing:0.12em;background:linear-gradient(90deg,#f9c846,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;}
#ov-sub{font-size:clamp(11px,3vw,14px);color:rgba(255,255,255,0.38);letter-spacing:0.1em;text-align:center;padding:0 24px;line-height:1.7;font-weight:700;}
#ov-sub .big{font-family:'Russo One',sans-serif;font-size:clamp(22px,6vw,32px);color:#f9c846;-webkit-text-fill-color:#f9c846;vertical-align:middle;}
#ov-play{background:linear-gradient(90deg,#f9c846,#f97316);border:none;border-radius:12px;color:#1a0800;font-family:'Russo One',sans-serif;font-size:clamp(14px,4vw,17px);letter-spacing:0.15em;padding:14px 44px;cursor:pointer;-webkit-appearance:none;appearance:none;outline:none;touch-action:manipulation;box-shadow:0 4px 22px rgba(249,200,70,0.4);transition:transform 0.07s;}
#ov-play:active{transform:scale(0.95);}
#ov-share{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);border-radius:10px;color:#fff;font-family:'Russo One',sans-serif;font-size:clamp(12px,3.2vw,14px);letter-spacing:0.15em;padding:11px 32px;cursor:pointer;-webkit-appearance:none;appearance:none;outline:none;touch-action:manipulation;transition:background 0.12s;display:none;}
#ov-share:active{transform:scale(0.95);}
#ov-share-toast{font-size:11px;color:#06d6a0;letter-spacing:0.15em;text-align:center;display:none;}
</style>
</head>
<body>

<div id="header">
  <a id="back" href="index.html">← ARCADE</a>
  <div id="hdc">
    <div id="title">PRICE CHECK</div>
    <div id="tagline">guess the price</div>
  </div>
  <div id="hdr"><div id="lives-disp">❤️❤️❤️</div></div>
</div>

<div id="game-area">
  <div id="round-label">ROUND 1 / 10</div>
  <div id="progress-bar"><div id="progress-fill" style="width:10%"></div></div>

  <div id="item-card">
    <div id="item-emoji">💰</div>
    <div id="item-name">Loading...</div>
    <div id="item-desc"></div>
    <div id="item-hint"></div>
  </div>

  <div id="price-display">$0</div>

  <div id="slider-wrap">
    <input type="range" id="price-slider" min="0" max="100" value="50" step="1">
    <div id="slider-labels"><span id="sl-min">$0</span><span id="sl-max">$100</span></div>
  </div>

  <button id="submit-btn" type="button">💰 SUBMIT GUESS</button>

  <div id="result-panel">
    <div id="result-title"></div>
    <div id="result-detail"></div>
    <div id="result-pts"></div>
    <button id="next-btn" type="button">NEXT ITEM →</button>
  </div>
</div>

<div id="ov">
  <div id="ov-emoji">💰</div>
  <div id="ov-title">PRICE CHECK</div>
  <div id="ov-sub">10 ITEMS · 3 LIVES<br>GUESS THE PRICE WITHOUT GOING OVER<br>CLOSER = MORE POINTS</div>
  <button id="ov-play" type="button">▶ START</button>
  <button id="ov-share" type="button">📤 SHARE RESULT</button>
  <div id="ov-share-toast">✅ COPIED TO CLIPBOARD</div>
</div>

<script>
(function(){
'use strict';

/* ── ITEMS ── */
var ITEMS = [
  {emoji:'🍔',name:'Big Mac',desc:'McDonald\'s signature burger',price:6,hint:'Fast food classic',sliderMax:20},
  {emoji:'☕',name:'Starbucks Latte',desc:'Grande latte at Starbucks',price:6,hint:'Grande size',sliderMax:15},
  {emoji:'🍕',name:'Large Pizza',desc:'Domino\'s large cheese pizza',price:14,hint:'Domino\'s carry-out',sliderMax:30},
  {emoji:'🥤',name:'Monster Energy',desc:'16oz can at convenience store',price:4,hint:'Single can',sliderMax:10},
  {emoji:'👟',name:'Nike Air Force 1',desc:'Classic white low-top sneaker',price:110,hint:'Retail price',sliderMax:250},
  {emoji:'👟',name:'Jordan 1 Retro High',desc:'OG colorway Air Jordan',price:180,hint:'Retail, not resale',sliderMax:400},
  {emoji:'🎧',name:'AirPods (3rd Gen)',desc:'Apple wireless earbuds',price:169,hint:'Base model',sliderMax:400},
  {emoji:'🎧',name:'AirPods Pro',desc:'Apple ANC earbuds',price:249,hint:'2nd generation',sliderMax:500},
  {emoji:'📱',name:'iPhone 15',desc:'Apple base model iPhone',price:799,hint:'128GB, new',sliderMax:1500},
  {emoji:'📱',name:'Samsung Galaxy S24',desc:'Samsung flagship phone',price:799,hint:'Base model',sliderMax:1500},
  {emoji:'💻',name:'MacBook Air M2',desc:'Apple 13-inch laptop',price:1099,hint:'8GB RAM, base',sliderMax:2000},
  {emoji:'🎮',name:'PlayStation 5',desc:'Sony gaming console',price:499,hint:'Disc edition',sliderMax:1000},
  {emoji:'🎮',name:'Nintendo Switch',desc:'Handheld gaming console',price:299,hint:'OLED model',sliderMax:500},
  {emoji:'📺',name:'55\" 4K TV',desc:'Samsung 55 inch smart TV',price:398,hint:'Entry-level 4K',sliderMax:800},
  {emoji:'⌚',name:'Apple Watch SE',desc:'Apple smartwatch SE',price:249,hint:'GPS model',sliderMax:500},
  {emoji:'🖥️',name:'iPad (10th Gen)',desc:'Apple base model iPad',price:449,hint:'WiFi, 64GB',sliderMax:1000},
  {emoji:'🛋️',name:'IKEA EKTORP Sofa',desc:'Classic 2-seat IKEA couch',price:449,hint:'Check IKEA.com',sliderMax:1000},
  {emoji:'🚗',name:'Toyota Corolla',desc:'2024 base model sedan',price:22000,hint:'MSRP, not negotiated',sliderMax:50000},
  {emoji:'🏠',name:'US Median Home',desc:'Median US home price 2024',price:420000,hint:'National median',sliderMax:1000000},
  {emoji:'✈️',name:'Economy Flight NYC→LA',desc:'One-way coach ticket',price:180,hint:'Average price',sliderMax:500},
  {emoji:'🏨',name:'NYC Hotel Room',desc:'Average one night in Manhattan',price:280,hint:'Mid-range hotel',sliderMax:600},
  {emoji:'⚽',name:'Adidas Soccer Ball',desc:'Official match ball',price:45,hint:'Entry-level match ball',sliderMax:100},
  {emoji:'🏀',name:'NBA Basketball',desc:'Spalding official game ball',price:180,hint:'Official game ball',sliderMax:400},
  {emoji:'🧢',name:'New Era 59FIFTY Cap',desc:'Official fitted MLB hat',price:40,hint:'Standard fitted',sliderMax:100},
  {emoji:'👕',name:'Supreme Box Logo Tee',desc:'Basic Supreme logo t-shirt',price:44,hint:'Retail, not resale',sliderMax:150},
  {emoji:'👜',name:'Louis Vuitton Neverfull',desc:'Classic LV tote bag',price:1740,hint:'MM size',sliderMax:4000},
  {emoji:'🎒',name:'North Face Backpack',desc:'Jester commuter backpack',price:99,hint:'Standard size',sliderMax:200},
  {emoji:'🕶️',name:'Ray-Ban Wayfarers',desc:'Classic sunglasses',price:183,hint:'Original frame',sliderMax:400},
  {emoji:'🥤',name:'Stanley Quencher 40oz',desc:'Viral tumbler cup',price:45,hint:'Standard color',sliderMax:100},
  {emoji:'🎸',name:'Fender Stratocaster',desc:'Player series electric guitar',price:849,hint:'Player series MX',sliderMax:2000},
  {emoji:'🎹',name:'Yamaha Keyboard',desc:'61-key beginner keyboard',price:150,hint:'Entry level',sliderMax:400},
  {emoji:'🏋️',name:'Peloton Bike',desc:'Original Peloton stationary bike',price:1445,hint:'Original bike',sliderMax:3000},
  {emoji:'🚲',name:'Trek Road Bike',desc:'Entry level road bicycle',price:899,hint:'Domane AL 2',sliderMax:2000},
  {emoji:'🐕',name:'Golden Retriever Puppy',desc:'From reputable breeder',price:1500,hint:'Average breeder price',sliderMax:4000},
  {emoji:'💍',name:'Diamond Engagement Ring',desc:'0.5 carat solitaire',price:2000,hint:'Average US price',sliderMax:5000},
  {emoji:'🎟️',name:'Taylor Swift Concert',desc:'Average resale ticket',price:1300,hint:'2024 Eras Tour avg',sliderMax:3000},
  {emoji:'🎟️',name:'NBA Finals Ticket',desc:'Average lower bowl seat',price:900,hint:'Per seat',sliderMax:2500},
  {emoji:'🍷',name:'Bottle of Dom Perignon',desc:'Champagne at restaurant',price:250,hint:'750ml',sliderMax:600},
  {emoji:'🍣',name:'Omakase Dinner NYC',desc:'Per person at top sushi restaurant',price:350,hint:'Per person, no drinks',sliderMax:800},
  {emoji:'🚀',name:'SpaceX Rocket Launch',desc:'Falcon 9 commercial launch',price:67000000,hint:'One launch',sliderMax:200000000},
];

/* ── STATE ── */
var lives = 3;
var score = 0;
var round = 0;
var totalRounds = 10;
var gs = 'idle';
var currentItem = null;
var usedIndices = [];
var answered = false;

/* ── SLIDER ── */
var slider = document.getElementById('price-slider');
var priceDisplay = document.getElementById('price-display');

function formatPrice(n){
  if(n >= 1000000) return '$' + (n/1000000).toFixed(1) + 'M';
  if(n >= 1000)    return '$' + n.toLocaleString();
  return '$' + n;
}

function updatePriceDisplay(){
  var val = sliderToPrice(parseFloat(slider.value));
  priceDisplay.textContent = formatPrice(Math.round(val));
}

/* ── NON-LINEAR SLIDER ── maps 0-100 to 0-sliderMax with exponential curve ── */
var currentMax = 100;

function sliderToPrice(pct){
  /* exponential: gives more precision at lower end */
  var t = pct / 100;
  return Math.round(currentMax * Math.pow(t, 2.0));
}

function setupSlider(item){
  currentMax = item.sliderMax;
  slider.min   = 0;
  slider.max   = 100;
  slider.value = 30;
  document.getElementById('sl-min').textContent = '$0';
  document.getElementById('sl-max').textContent = formatPrice(item.sliderMax);
  updatePriceDisplay();
}

slider.addEventListener('input', updatePriceDisplay);

/* ── LOAD ITEM ── */
function loadItem(){
  /* pick unused random item */
  var available = [];
  for(var i = 0; i < ITEMS.length; i++){
    if(usedIndices.indexOf(i) === -1) available.push(i);
  }
  if(available.length === 0){ usedIndices = []; available = ITEMS.map(function(_,i){return i;}); }
  var idx = available[Math.floor(Math.random() * available.length)];
  usedIndices.push(idx);
  currentItem = ITEMS[idx];

  document.getElementById('item-emoji').textContent = currentItem.emoji;
  document.getElementById('item-name').textContent  = currentItem.name;
  document.getElementById('item-desc').textContent  = currentItem.desc;
  document.getElementById('item-hint').textContent  = '💡 ' + currentItem.hint;
  document.getElementById('round-label').textContent = 'ROUND ' + round + ' / ' + totalRounds;
  document.getElementById('progress-fill').style.width = ((round-1)/totalRounds*100) + '%';

  setupSlider(currentItem);

  /* show game controls */
  document.getElementById('submit-btn').style.display = 'block';
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('result-panel').style.display = 'none';
  answered = false;
}

/* ── SUBMIT ── */
document.getElementById('submit-btn').addEventListener('click', function(){
  if(answered || !currentItem || gs !== 'run') return;
  answered = true;
  document.getElementById('submit-btn').disabled = true;

  var guess  = sliderToPrice(parseFloat(slider.value));
  var actual = currentItem.price;
  var diff   = guess - actual;
  var absDiff = Math.abs(diff);
  var pct    = actual > 0 ? absDiff / actual : 0;
  var over   = diff > 5; // only "over" if more than $5 above
  var pts    = 0;
  var grade  = '';
  var gradeCol = '#fff';

  if(diff >= -5 && diff <= 5){
    /* within $5 either way = NICE */
    pts = 300; grade = 'NICE! 👍'; gradeCol = '#63caff';
  } else if(over){
    /* more than $5 over = no points, lose a life */
    pts = 0;
    grade = 'OVER! ❌';
    gradeCol = '#ef4444';
    lives--;
    updLives();
  } else if(pct <= 0.02){
    pts = 500; grade = 'PERFECT! 🎯'; gradeCol = '#f9c846';
  } else if(pct <= 0.10){
    pts = 300; grade = 'SO CLOSE! 🔥'; gradeCol = '#f97316';
  } else if(pct <= 0.25){
    pts = 150; grade = 'GOOD! 👍'; gradeCol = '#63caff';
  } else if(pct <= 0.50){
    pts = 50;  grade = 'NOT BAD'; gradeCol = '#a78bfa';
  } else {
    pts = 10;  grade = 'WAY OFF'; gradeCol = 'rgba(255,255,255,0.5)';
  }

  score += pts;

  /* show result */
  var panel = document.getElementById('result-panel');
  panel.style.display = 'block';
  var rt = document.getElementById('result-title');
  rt.textContent = grade;
  rt.style.color = gradeCol;

  var diffStr = diff === 0 ? 'Exact!' :
    (over ? '+' : '-') + formatPrice(Math.abs(diff)) + ' ' + (over ? 'over' : 'under');
  document.getElementById('result-detail').textContent =
    'Actual price: ' + formatPrice(actual) + '   ·   Your guess: ' + formatPrice(guess) + '\n' + diffStr;

  var ptsEl = document.getElementById('result-pts');
  ptsEl.textContent = pts > 0 ? '+' + pts + ' pts' : 'No points';
  ptsEl.style.color = pts > 0 ? '#f9c846' : '#ef4444';

  updScore();

  /* check end conditions */
  if(lives <= 0){
    setTimeout(endGame, 1200);
  } else if(round >= totalRounds){
    setTimeout(endGame, 1200);
  }
});

document.getElementById('next-btn').addEventListener('click', function(){
  if(lives <= 0 || round >= totalRounds){ endGame(); return; }
  round++;
  loadItem();
});

/* ── LIVES ── */
function updLives(){
  var h = '';
  for(var i = 0; i < 3; i++) h += (i < lives ? '❤️' : '🖤');
  document.getElementById('lives-disp').textContent = h;
}

function updScore(){
  /* no separate score HUD, show in result */
}

/* ── END ── */
function endGame(){
  gs = 'done';
  var won = lives > 0;
  document.getElementById('ov-emoji').textContent = won ? '🏆' : '💸';
  document.getElementById('ov-title').textContent = won ? 'NICE SHOPPING!' : 'BROKE!';
  document.getElementById('ov-sub').innerHTML =
    'FINAL SCORE &nbsp;<span class="big">' + score + '</span><br>' +
    (won ? 'You survived all 10 rounds!' : 'You went over too many times!');
  document.getElementById('ov-play').textContent = 'PLAY AGAIN';
  document.getElementById('ov').classList.remove('hidden');
  /* share button */
  var shareBtn = document.getElementById('ov-share');
  shareBtn.style.display = 'block';
  shareBtn.onclick = function(){
    var txt = '💰 PRICE CHECK\nScore: ' + score + ' | ' + (won ? 'Survived all 10!' : 'Went broke!') + '\n▶ https://boltarcade.github.io/BoltArcade';
    if(navigator.share){ navigator.share({text:txt}); }
    else{ navigator.clipboard.writeText(txt).then(function(){
      var t = document.getElementById('ov-share-toast'); t.style.display='block';
      setTimeout(function(){ t.style.display='none'; }, 2000);
    }); }
  };
}

/* ── START ── */
function startGame(){
  lives = 3; score = 0; round = 1;
  usedIndices = []; answered = false; gs = 'run';
  updLives();
  document.getElementById('ov-share').style.display = 'none';
  document.getElementById('ov-share-toast').style.display = 'none';
  document.getElementById('ov').classList.add('hidden');
  loadItem();
}

document.getElementById('ov-play').addEventListener('click', startGame);
document.getElementById('ov-play').addEventListener('touchend', function(e){ e.preventDefault(); startGame(); });

/* show overlay on load */
document.getElementById('ov').classList.remove('hidden');

}());
</script>
</body>
</html>

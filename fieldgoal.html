<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FIELD GOAL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Nunito:wght@700;900&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;}
body{
  display:flex;flex-direction:column;align-items:center;
  justify-content:space-between;
  touch-action:none;-webkit-user-select:none;user-select:none;
  -webkit-tap-highlight-color:transparent;
  font-family:'Nunito',sans-serif;color:#fff;
  background:#0a1a0a;
  padding:env(safe-area-inset-top,6px) 0 env(safe-area-inset-bottom,6px);
  height:100vh;height:100dvh;
}
#header{flex-shrink:0;width:min(96vw,500px);display:flex;align-items:center;justify-content:space-between;padding:2px 6px 0;}
#back{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.3);text-decoration:none;min-width:50px;font-weight:700;}
#back:hover{color:rgba(255,255,255,0.6);}
#hdc{text-align:center;}
#title{font-family:'Russo One',sans-serif;font-size:clamp(18px,5vw,26px);letter-spacing:0.1em;background:linear-gradient(90deg,#f9c846,#ffffff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#tagline{font-size:8px;color:rgba(255,255,255,0.2);letter-spacing:0.25em;text-transform:uppercase;margin-top:1px;}
#hdr{min-width:50px;}
#wrap{flex:1 1 auto;position:relative;width:min(96vw,500px);min-height:0;margin:4px 0;border-radius:14px;overflow:hidden;box-shadow:0 0 0 2px rgba(249,200,70,0.2),0 12px 40px rgba(0,0,0,0.7);}
canvas{display:block;width:100%;height:100%;}
#bottom{flex-shrink:0;width:min(96vw,500px);display:flex;gap:6px;padding:0 2px;}
.hc{flex:1;background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.09);border-radius:10px;padding:4px 6px;text-align:center;}
.hl{font-size:8px;color:rgba(255,255,255,0.28);letter-spacing:0.2em;text-transform:uppercase;}
.hv{display:block;font-family:'Russo One',sans-serif;font-size:clamp(14px,3.8vw,19px);line-height:1.1;}
#sv{color:#f9c846;}#distv{color:#63caff;}#wv2{color:#ff6b6b;}
#ov{position:absolute;inset:0;border-radius:14px;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(2,10,2,0.93);transition:opacity 0.22s;pointer-events:auto;}
#ov.hidden{opacity:0;pointer-events:none;}
#ov-title{font-family:'Russo One',sans-serif;font-size:clamp(26px,8vw,46px);letter-spacing:0.1em;background:linear-gradient(90deg,#f9c846,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#ov-sub{font-size:clamp(11px,2.8vw,13px);color:rgba(255,255,255,0.38);letter-spacing:0.1em;text-align:center;padding:0 20px;line-height:1.7;font-weight:700;}
#ov-sub .big{font-family:'Russo One',sans-serif;font-size:clamp(20px,5.5vw,28px);color:#f9c846;-webkit-text-fill-color:#f9c846;vertical-align:middle;}
#play-btn{background:linear-gradient(90deg,#f9c846,#fff);border:none;border-radius:12px;color:#1a1a00;font-family:'Russo One',sans-serif;font-size:clamp(14px,4vw,17px);letter-spacing:0.15em;padding:13px 44px;cursor:pointer;-webkit-appearance:none;appearance:none;outline:none;touch-action:manipulation;box-shadow:0 4px 22px rgba(249,200,70,0.4);transition:transform 0.07s;margin-top:2px;}
#play-btn:active{transform:scale(0.95);}
#share-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);border-radius:10px;color:#fff;font-family:'Russo One',sans-serif;font-size:clamp(11px,3vw,13px);letter-spacing:0.15em;padding:10px 28px;cursor:pointer;-webkit-appearance:none;appearance:none;outline:none;touch-action:manipulation;display:none;margin-top:-4px;}
#share-toast{font-size:10px;color:#06d6a0;letter-spacing:0.15em;text-align:center;display:none;}
#ov-h{font-size:9px;color:rgba(255,255,255,0.12);letter-spacing:0.18em;text-align:center;}
</style>
</head>
<body>

<div id="header">
  <a id="back" href="index.html">← ARCADE</a>
  <div id="hdc">
    <div id="title">🏈 FIELD GOAL</div>
    <div id="tagline">tap when the line is centered</div>
  </div>
  <div id="hdr"></div>
</div>

<div id="wrap">
  <canvas id="c"></canvas>
  <div id="ov">
    <div id="ov-title">🏈 FIELD GOAL</div>
    <div id="ov-sub">A LINE SWEEPS LEFT AND RIGHT<br>TAP WHEN IT'S CENTERED<br>WIND PUSHES THE BALL</div>
    <button id="play-btn" type="button">▶ KICK OFF</button>
    <button id="share-btn" type="button">📤 SHARE RESULT</button>
    <div id="share-toast">✅ COPIED!</div>
    <div id="ov-h">distance gets harder each kick</div>
  </div>
</div>

<div id="bottom">
  <div class="hc"><div class="hl">score</div><span class="hv" id="sv">0</span></div>
  <div class="hc"><div class="hl">yards</div><span class="hv" id="distv">20</span></div>
  <div class="hc"><div class="hl">wind</div><span class="hv" id="wv2">none</span></div>
</div>

<script>
(function(){
'use strict';

var canvas = document.getElementById('c');
var ctx    = canvas.getContext('2d');
var W, H;

function resize(){
  var r = document.getElementById('wrap').getBoundingClientRect();
  W = Math.round(r.width);
  H = Math.round(r.height);
  canvas.width  = W;
  canvas.height = H;
}
window.addEventListener('resize', function(){ resize(); initLayout(); });
resize();

/* ── LAYOUT ── */
var UPX, UPY, UPW, UPH; // uprights
var BALL_X, BALL_Y, BALL_R;

function initLayout(){
  UPX = W / 2;
  UPY = H * 0.08;
  UPW = W * 0.38;
  UPH = H * 0.24;
  BALL_X = W / 2;
  BALL_Y = H * 0.76;
  BALL_R = Math.max(12, Math.round(W * 0.048));
}
initLayout();
window.addEventListener('resize', initLayout);

/* ── STATE ── */
var gs      = 'idle';
var score   = 0;
var yards   = 20;
var wind    = 0;      // -1..1 drift per frame
var kicking = false;
var result  = '';
var resultTimer = 0;
var parts   = [];
var misses  = 0;
var MAX_MISSES = 3;

/* ── AIM LINE ── */
/* Sweeps left↔right across the uprights zone.
   aimX = 0 = center, -1 = far left, 1 = far right.
   Speed increases with yards. */
var aimX     = 0;   // -1..1
var aimDir   = 1;
var aimSpeed = 0.018;

/* ── BALL PHYSICS ── */
var ball = null;

function launchBall(aimAtKick){
  /* aimAtKick: how far off-center the aim line was (-1..1) */
  /* Ball flies upward. X drifts based on aim error + wind. */
  var drift = aimAtKick * W * 0.22 + wind * W * 0.18;
  ball = {
    x:  BALL_X,
    y:  BALL_Y,
    vy: -(H * 0.028),
    dx: drift / 55,  // spread out over ~55 frames
    scale: 1.0,      // shrinks as it "goes far"
    trail: [],
    rot: 0
  };
  kicking = true;
}

/* ── TAP ── */
canvas.addEventListener('touchstart', function(e){
  e.preventDefault();
  if(gs !== 'run' || kicking) return;
  doKick();
}, {passive:false});
canvas.addEventListener('mousedown', function(){
  if(gs !== 'run' || kicking) return;
  doKick();
});

function doKick(){
  /* capture aim position */
  var captured = aimX;
  launchBall(captured);
}

/* ── PARTICLES ── */
function burst(x,y,col,n){
  for(var i=0;i<n;i++){
    var a=Math.random()*Math.PI*2,s=2+Math.random()*5;
    parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2.5,
      col:col,life:1,dec:0.028+Math.random()*0.04,r:3+Math.random()*4});
  }
}
function tickParts(){
  for(var i=parts.length-1;i>=0;i--){
    var p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life-=p.dec;
    if(p.life<=0)parts.splice(i,1);
  }
}
function drawParts(){
  for(var i=0;i<parts.length;i++){
    var p=parts[i];
    ctx.save();ctx.globalAlpha=p.life*p.life;
    ctx.fillStyle=p.col;ctx.shadowColor=p.col;ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

/* ── UPDATE BALL ── */
function updateBall(){
  if(!ball||!kicking) return;

  ball.x += ball.dx;
  ball.y += ball.vy;
  ball.vy *= 0.97; // slow vertical rise
  ball.scale = Math.max(0.25, ball.scale - 0.012); // shrinks as it rises
  ball.rot   += 0.12;

  ball.trail.push({x:ball.x, y:ball.y, sc:ball.scale});
  if(ball.trail.length > 12) ball.trail.shift();

  /* when ball reaches upright level */
  if(ball.y <= UPY + UPH * 0.5){
    /* evaluate: where did ball end up horizontally? */
    var lx = UPX - UPW/2;
    var rx = UPX + UPW/2;
    var good = ball.x > lx && ball.x < rx;

    if(good){
      score += Math.round(yards / 10);
      result = 'GOOD! ✅';
      resultTimer = 100;
      yards += 5;
      burst(ball.x, UPY+UPH*0.3, '#f9c846', 24);
      burst(ball.x, UPY+UPH*0.3, '#ffffff', 10);
    } else {
      result = 'NO GOOD ❌';
      resultTimer = 80;
      misses++;
      burst(ball.x, ball.y, '#ff4040', 14);
      if(misses >= MAX_MISSES){
        gs = 'done';
        setTimeout(function(){
          showOv('GAME OVER','SCORE &nbsp;<span class="big">'+score+'</span>','PLAY AGAIN');
          var sb=document.getElementById('share-btn');sb.style.display='block';
          sb.onclick=function(){var txt='🏈 FIELD GOAL\nScore: '+score+' | Furthest: '+yards+'yd\n▶ https://boltarcade.github.io/BoltArcade';if(navigator.share){navigator.share({text:txt});}else{navigator.clipboard.writeText(txt).then(function(){var t=document.getElementById('share-toast');t.style.display='block';setTimeout(function(){t.style.display='none';},2000);});}}
        }, 900);
      }
    }
    kicking = false; ball = null;
    newWind(); updHUD();
    /* speed increases every yard — recalc from current yards */
    aimSpeed = Math.min(0.075, 0.016 + yards * 0.00085);
  }
}

/* ── NEW WIND ── */
function newWind(){
  wind = (Math.random()-0.5) * 2 * (yards * 0.012);
  var dir = wind > 0 ? '→' : '←';
  var str = Math.abs(wind) < 0.01 ? 'none' : dir.repeat(Math.min(4, Math.ceil(Math.abs(wind)*20)));
  document.getElementById('wv2').textContent = str || 'none';
  document.getElementById('distv').textContent = yards + ' yd';
}

/* ── DRAW SCENE ── */
function drawField(){
  /* sky */
  var sky = ctx.createLinearGradient(0,0,0,H*0.5);
  sky.addColorStop(0,'#0a1428'); sky.addColorStop(1,'#1a2a4a');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H*0.52);

  /* bleachers */
  ctx.fillStyle='#1a2a1a'; ctx.fillRect(0,0,W,H*0.2);

  /* crowd dots */
  ctx.save(); ctx.globalAlpha=0.45;
  var cc=['#ff6b6b','#fff','#f9c846','#63caff','#a78bfa'];
  for(var ci=0;ci<130;ci++){
    ctx.fillStyle=cc[ci%cc.length];
    ctx.beginPath();
    ctx.arc((ci*79+13)%W, H*0.025+((ci*41)%(H*0.165)), 2.2, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();

  /* grass */
  var gd=ctx.createLinearGradient(0,H*0.48,0,H);
  gd.addColorStop(0,'#1a6b1a'); gd.addColorStop(0.5,'#228b22'); gd.addColorStop(1,'#1a5a1a');
  ctx.fillStyle=gd; ctx.fillRect(0,H*0.48,W,H*0.52);

  /* grass stripes */
  ctx.save(); ctx.globalAlpha=0.07;
  for(var gi=0;gi<7;gi++){
    ctx.fillStyle=gi%2===0?'#000':'#fff';
    ctx.fillRect(gi*(W/7),H*0.48,W/7,H*0.52);
  }
  ctx.restore();

  /* yard lines */
  ctx.save(); ctx.strokeStyle='rgba(255,255,255,0.22)'; ctx.lineWidth=1.5;
  for(var li=0;li<5;li++){
    var ly=H*0.52+li*(H*0.12);
    ctx.beginPath(); ctx.moveTo(0,ly); ctx.lineTo(W,ly); ctx.stroke();
  }
  ctx.restore();

  /* hash marks */
  ctx.save(); ctx.strokeStyle='rgba(255,255,255,0.32)'; ctx.lineWidth=1;
  for(var hi=0;hi<8;hi++){
    var hy=H*0.52+hi*(H*0.065);
    ctx.beginPath();ctx.moveTo(W*0.37,hy);ctx.lineTo(W*0.42,hy);ctx.stroke();
    ctx.beginPath();ctx.moveTo(W*0.58,hy);ctx.lineTo(W*0.63,hy);ctx.stroke();
  }
  ctx.restore();
}

function drawUprights(){
  var lx = UPX - UPW/2;
  var rx = UPX + UPW/2;
  var crossY = UPY + UPH;
  var poleBot= crossY + H * 0.14;

  ctx.save();
  ctx.lineCap = 'round';
  ctx.shadowColor = 'rgba(255,210,30,0.55)';
  ctx.shadowBlur  = 10;
  ctx.strokeStyle = '#f9c846';
  ctx.lineWidth   = Math.max(3, W*0.014);

  /* vertical pole from ground up to crossbar */
  ctx.beginPath(); ctx.moveTo(UPX,poleBot); ctx.lineTo(UPX,crossY); ctx.stroke();
  /* crossbar */
  ctx.beginPath(); ctx.moveTo(lx,crossY); ctx.lineTo(rx,crossY); ctx.stroke();
  /* left post */
  ctx.beginPath(); ctx.moveTo(lx,crossY); ctx.lineTo(lx,UPY); ctx.stroke();
  /* right post */
  ctx.beginPath(); ctx.moveTo(rx,crossY); ctx.lineTo(rx,UPY); ctx.stroke();

  ctx.restore();

  /* subtle goal highlight */
  ctx.save();
  ctx.globalAlpha = 0.07;
  ctx.fillStyle   = '#f9c846';
  ctx.fillRect(lx, UPY, UPW, UPH);
  ctx.restore();
}

/* ── DRAW AIM LINE ── */
function drawAimLine(){
  if(kicking || gs !== 'run') return;

  /* advance aim oscillation */
  aimX += aimDir * aimSpeed;
  if(aimX >  1){ aimX =  1; aimDir = -1; }
  if(aimX < -1){ aimX = -1; aimDir =  1; }

  /* map aimX to screen X — constrained to upright width + a bit outside */
  var range  = UPW * 0.75;
  var lineX  = UPX + aimX * range;
  var lineTop = UPY - H * 0.04;
  var lineBot = BALL_Y - BALL_R;

  /* color based on how centered */
  var goodZone = Math.abs(aimX) < 0.35;
  var okZone   = Math.abs(aimX) < 0.65;
  var lineCol  = goodZone ? '#06d6a0' : okZone ? '#f9c846' : '#ff6b6b';

  ctx.save();
  ctx.shadowColor = lineCol; ctx.shadowBlur = 10;
  ctx.strokeStyle = lineCol; ctx.lineWidth  = 3;
  ctx.setLineDash([10, 6]);
  ctx.beginPath(); ctx.moveTo(lineX, lineTop); ctx.lineTo(lineX, lineBot); ctx.stroke();
  ctx.setLineDash([]);

  /* triangle pointer at top of line */
  ctx.fillStyle = lineCol;
  ctx.beginPath();
  ctx.moveTo(lineX-8, lineTop+2);
  ctx.lineTo(lineX+8, lineTop+2);
  ctx.lineTo(lineX,   lineTop-10);
  ctx.closePath(); ctx.fill();

  /* circle at bottom connecting to ball */
  ctx.beginPath(); ctx.arc(lineX, lineBot+4, 5, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

/* ── DRAW FOOTBALL ── */
function drawFootball(x, y, r, rot, alpha){
  ctx.save();
  ctx.globalAlpha = alpha || 1;
  ctx.translate(x, y);
  ctx.rotate(rot || -0.5);

  /* shadow */
  ctx.shadowColor = 'rgba(180,90,0,0.45)';
  ctx.shadowBlur  = r * 1.2;

  /* body — pointed ellipse via bezier */
  var bw = r * 1.0;
  var bh = r * 0.65;
  var grad = ctx.createRadialGradient(-bw*0.25,-bh*0.3,bw*0.06,0,0,bw);
  grad.addColorStop(0, '#d4906a');
  grad.addColorStop(0.45,'#a0521a');
  grad.addColorStop(1,   '#5a2800');
  ctx.fillStyle = grad;

  ctx.beginPath();
  ctx.moveTo(0, -bh);
  ctx.bezierCurveTo( bw*1.1, -bh*0.5,  bw*1.1,  bh*0.5, 0,  bh);
  ctx.bezierCurveTo(-bw*1.1,  bh*0.5, -bw*1.1, -bh*0.5, 0, -bh);
  ctx.closePath();
  ctx.fill();

  /* lace stripe - vertical white line */
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth   = Math.max(1, r*0.09);
  ctx.beginPath(); ctx.moveTo(0,-bh*0.6); ctx.lineTo(0,bh*0.6); ctx.stroke();

  /* laces - horizontal dashes */
  ctx.lineWidth = Math.max(0.7, r*0.07);
  [-bh*0.28, -bh*0.08, bh*0.12, bh*0.32].forEach(function(ly){
    ctx.beginPath(); ctx.moveTo(-bw*0.22,ly); ctx.lineTo(bw*0.22,ly); ctx.stroke();
  });

  /* shine */
  ctx.fillStyle = 'rgba(255,255,255,0.28)';
  ctx.beginPath(); ctx.ellipse(-bw*0.3,-bh*0.35, bw*0.22, bh*0.18, -0.6, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

/* ── DRAW BALL IN FLIGHT ── */
function drawBallFn(){
  if(!ball) return;

  /* trail */
  for(var i=0;i<ball.trail.length;i++){
    var t=ball.trail[i], a=(i/ball.trail.length)*0.3;
    ctx.save(); ctx.globalAlpha=a*0.35;
    ctx.fillStyle='rgba(200,110,30,0.7)';
    var tr=BALL_R*t.sc*(0.28+0.55*(i/ball.trail.length));
    ctx.beginPath(); ctx.arc(t.x,t.y,tr,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  drawFootball(ball.x, ball.y, BALL_R*ball.scale, ball.rot, 1);
}

/* ── WIND ARROW ── */
function drawWindArrow(){
  if(Math.abs(wind) < 0.005) return;
  ctx.save();
  ctx.font      = 'bold '+Math.round(H*0.032)+'px Russo One, sans-serif';
  ctx.fillStyle = 'rgba(99,202,240,0.75)';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor='#63caff'; ctx.shadowBlur=8;
  var arrows = (wind>0?'→':'←').repeat(Math.min(4,Math.ceil(Math.abs(wind)*18)));
  ctx.fillText('WIND '+arrows, W/2, H*0.42);
  ctx.restore();
}

/* ── RESULT LABEL ── */
function drawResult(){
  if(resultTimer<=0) return; resultTimer--;
  var alpha = resultTimer>60?1:resultTimer/60;
  var sc2   = resultTimer>80?1+(100-resultTimer)*0.012:1;
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.translate(W/2,H*0.5);ctx.scale(sc2,sc2);
  ctx.font='bold '+Math.round(H*0.07)+'px Russo One, sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  var good=result.includes('GOOD!');
  ctx.fillStyle=good?'#f9c846':'#ff6b6b';
  ctx.shadowColor=good?'#f9c846':'#ff6b6b';ctx.shadowBlur=22;
  ctx.fillText(result,0,0);
  ctx.restore();
}

/* ── HINT ── */
function drawHint(){
  if(kicking||gs!=='run') return;
  var pulse=0.35+0.35*Math.sin(Date.now()*0.007);
  ctx.save();ctx.globalAlpha=pulse;
  ctx.font='bold '+Math.round(H*0.03)+'px Russo One, sans-serif';
  ctx.fillStyle='rgba(255,200,80,0.8)';
  ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.fillText('TAP WHEN CENTERED!',W/2,H*0.99);
  ctx.restore();
}

/* ── HUD ── */
function updHUD(){
  document.getElementById('sv').textContent   = score;
  document.getElementById('distv').textContent= yards+' yd';
}

/* ── OVERLAY ── */
function showOv(t,m,b){
  document.getElementById('ov-title').textContent=t;
  document.getElementById('ov-sub').innerHTML=m;
  document.getElementById('play-btn').textContent=b;
  document.getElementById('ov').classList.remove('hidden');
}

/* ── HEARTS ON CANVAS ── */
function drawHearts(){
  if(gs !== 'run' && gs !== 'done') return;
  var hs = Math.round(H * 0.038);
  var px2 = 10;
  var py2 = H - hs - 10;
  ctx.save();
  ctx.font = hs + 'px serif';
  ctx.textBaseline = 'top';
  for(var i = 0; i < MAX_MISSES; i++){
    ctx.globalAlpha = i < (MAX_MISSES - misses) ? 1.0 : 0.22;
    ctx.fillText('❤️', px2 + i*(hs+4), py2);
  }
  ctx.restore();
}

/* ── LOOP ── */
function loop(){
  requestAnimationFrame(loop);
  updateBall();
  tickParts();

  drawField();
  drawUprights();
  drawWindArrow();

  /* idle football on tee */
  if(!ball && gs==='run'){
    /* tee */
    ctx.save();
    ctx.fillStyle='#cc0000';
    var tx=BALL_X, ty=BALL_Y+BALL_R;
    ctx.beginPath();
    ctx.moveTo(tx-5,ty); ctx.lineTo(tx+5,ty);
    ctx.lineTo(tx+3,ty+12); ctx.lineTo(tx-3,ty+12);
    ctx.closePath(); ctx.fill();
    ctx.restore();
    drawFootball(BALL_X, BALL_Y, BALL_R, -0.5, 1);
  }

  drawBallFn();
  drawAimLine();
  drawParts();
  drawHearts();
  drawResult();
  drawHint();
}

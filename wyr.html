<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>WOULD YOU RATHER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Nunito:wght@700;900&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;}
body{
  display:flex;flex-direction:column;align-items:center;
  justify-content:space-between;
  touch-action:manipulation;
  -webkit-user-select:none;user-select:none;
  -webkit-tap-highlight-color:transparent;
  font-family:'Nunito',sans-serif;color:#fff;
  background:#0d0d1a;
  padding:env(safe-area-inset-top,6px) 0 env(safe-area-inset-bottom,8px);
  height:100vh;height:100dvh;
}

/* HEADER */
#header{
  flex-shrink:0;width:min(96vw,500px);
  display:flex;align-items:center;justify-content:space-between;
  padding:2px 8px 0;
}
#back{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.28);text-decoration:none;min-width:50px;font-weight:700;}
#back:hover{color:rgba(255,255,255,0.6);}
#hdc{text-align:center;}
#title{font-family:'Russo One',sans-serif;font-size:clamp(14px,4vw,20px);letter-spacing:0.1em;background:linear-gradient(90deg,#a855f7,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#tagline{font-size:8px;color:rgba(255,255,255,0.2);letter-spacing:0.25em;text-transform:uppercase;margin-top:1px;}
#hdr{min-width:50px;text-align:right;}
#q-counter{font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:0.15em;font-weight:700;}

/* MAIN */
#game-area{
  flex:1 1 auto;
  width:min(96vw,500px);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:12px;
  padding:4px 8px;
  min-height:0;
}

/* PROGRESS */
#prog-wrap{width:100%;flex-shrink:0;}
#prog-bar{width:100%;height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;}
#prog-fill{height:100%;background:linear-gradient(90deg,#a855f7,#3b82f6);border-radius:3px;transition:width 0.5s;}

/* QUESTION CARD */
#q-card{
  width:100%;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  padding:18px 16px 14px;
  text-align:center;
  flex-shrink:0;
  transition:opacity 0.2s,transform 0.2s;
}
#q-card.fade{opacity:0;transform:scale(0.97);}
#wyr-label{
  font-size:10px;letter-spacing:0.3em;text-transform:uppercase;
  color:rgba(255,255,255,0.25);margin-bottom:8px;font-weight:700;
}
#q-text{
  font-family:'Russo One',sans-serif;
  font-size:clamp(15px,4.2vw,20px);
  letter-spacing:0.04em;
  line-height:1.35;
  color:#fff;
}

/* OR DIVIDER */
#or-div{
  font-family:'Russo One',sans-serif;
  font-size:clamp(11px,3vw,14px);
  letter-spacing:0.3em;
  color:rgba(255,255,255,0.2);
  flex-shrink:0;
}

/* CHOICE BUTTONS */
#choices{width:100%;display:flex;flex-direction:column;gap:10px;flex-shrink:0;}

.choice-btn{
  width:100%;padding:14px 16px;
  border-radius:14px;border:2px solid transparent;
  font-family:'Nunito',sans-serif;font-weight:900;
  font-size:clamp(13px,3.5vw,16px);
  line-height:1.3;
  text-align:center;
  cursor:pointer;
  -webkit-appearance:none;appearance:none;outline:none;
  touch-action:manipulation;
  transition:transform 0.08s, border-color 0.15s, background 0.15s;
  position:relative;overflow:hidden;
}
.choice-btn:active{transform:scale(0.97);}

#btn-a{
  background:rgba(168,85,247,0.12);
  border-color:rgba(168,85,247,0.35);
  color:#d8b4fe;
}
#btn-a:hover{background:rgba(168,85,247,0.2);border-color:rgba(168,85,247,0.6);}

#btn-b{
  background:rgba(59,130,246,0.12);
  border-color:rgba(59,130,246,0.35);
  color:#93c5fd;
}
#btn-b:hover{background:rgba(59,130,246,0.2);border-color:rgba(59,130,246,0.6);}

/* RESULT BAR (shown after pick) */
.result-overlay{
  position:absolute;top:0;left:0;height:100%;
  border-radius:12px;
  opacity:0;
  transition:opacity 0.4s, width 0.6s;
  pointer-events:none;
}
#btn-a .result-overlay{background:rgba(168,85,247,0.25);}
#btn-b .result-overlay{background:rgba(59,130,246,0.25);}

.btn-content{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.btn-text{flex:1;text-align:left;}
.btn-pct{
  font-family:'Russo One',sans-serif;
  font-size:clamp(14px,4vw,18px);
  opacity:0;transition:opacity 0.4s;
  white-space:nowrap;
}
#btn-a .btn-pct{color:#d8b4fe;}
#btn-b .btn-pct{color:#93c5fd;}

/* CHOSEN INDICATOR */
.choice-btn.chosen{border-width:2px;}
#btn-a.chosen{border-color:#a855f7;background:rgba(168,85,247,0.18);}
#btn-b.chosen{border-color:#3b82f6;background:rgba(59,130,246,0.18);}
.choice-btn.chosen.majority{box-shadow:0 0 16px rgba(255,255,255,0.15);}

/* NEXT BUTTON */
#next-btn{
  width:100%;padding:13px 0;flex-shrink:0;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.14);
  border-radius:12px;color:rgba(255,255,255,0.7);
  font-family:'Russo One',sans-serif;
  font-size:clamp(12px,3.5vw,15px);letter-spacing:0.15em;
  cursor:pointer;-webkit-appearance:none;appearance:none;outline:none;
  touch-action:manipulation;
  transition:background 0.12s,opacity 0.2s;
  opacity:0;pointer-events:none;
}
#next-btn.show{opacity:1;pointer-events:auto;}
#next-btn:hover{background:rgba(255,255,255,0.12);}
#next-btn:active{transform:scale(0.97);}

/* CONSENSUS LABEL */
#consensus{
  font-size:clamp(11px,3vw,13px);
  color:rgba(255,255,255,0.4);
  letter-spacing:0.1em;
  text-align:center;
  min-height:18px;
  flex-shrink:0;
  font-weight:700;
}
#consensus .highlight{color:#f9c846;}

/* OVERLAY */
#ov{
  position:fixed;inset:0;z-index:50;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:rgba(8,8,20,0.97);
  transition:opacity 0.25s;pointer-events:auto;
  padding:20px;
}
#ov.hidden{opacity:0;pointer-events:none;}
#ov-emoji{font-size:clamp(40px,12vw,64px);text-align:center;}
#ov-title{font-family:'Russo One',sans-serif;font-size:clamp(22px,7vw,40px);letter-spacing:0.1em;background:linear-gradient(90deg,#a855f7,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;}
#ov-sub{font-size:clamp(11px,3vw,14px);color:rgba(255,255,255,0.38);letter-spacing:0.08em;text-align:center;padding:0 16px;line-height:1.7;font-weight:700;}
#ov-sub .big{font-family:'Russo One',sans-serif;font-size:clamp(20px,5.5vw,28px);color:#a855f7;-webkit-text-fill-color:#a855f7;vertical-align:middle;}
#ov-stats{
  width:100%;max-width:320px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;
  padding:14px 18px;
  display:none;
}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.stat-row:last-child{border-bottom:none;}
.stat-label{font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:0.15em;text-transform:uppercase;}
.stat-val{font-family:'Russo One',sans-serif;font-size:14px;color:#f9c846;}
#ov-play{background:linear-gradient(90deg,#a855f7,#3b82f6);border:none;border-radius:12px;color:#fff;font-family:'Russo One',sans-serif;font-size:clamp(14px,4vw,17px);letter-spacing:0.15em;padding:13px 44px;cursor:pointer;-webkit-appearance:none;appearance:none;outline:none;touch-action:manipulation;box-shadow:0 4px 22px rgba(168,85,247,0.35);transition:transform 0.07s;}
#ov-play:active{transform:scale(0.95);}
#ov-share{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);border-radius:10px;color:#fff;font-family:'Russo One',sans-serif;font-size:clamp(12px,3.2vw,14px);letter-spacing:0.15em;padding:11px 32px;cursor:pointer;-webkit-appearance:none;appearance:none;outline:none;touch-action:manipulation;display:none;}
#ov-share:active{transform:scale(0.95);}
#ov-copy-toast{font-size:11px;color:#06d6a0;letter-spacing:0.15em;display:none;}
</style>
</head>
<body>

<div id="header">
  <a id="back" href="index.html">← ARCADE</a>
  <div id="hdc">
    <div id="title">WOULD YOU RATHER</div>
    <div id="tagline">pick one · no going back</div>
  </div>
  <div id="hdr"><div id="q-counter">1 / 10</div></div>
</div>

<div id="game-area">
  <div id="prog-wrap">
    <div id="prog-bar"><div id="prog-fill" style="width:0%"></div></div>
  </div>

  <div id="q-card">
    <div id="wyr-label">WOULD YOU RATHER</div>
    <div id="q-text">Loading...</div>
  </div>

  <div id="or-div">— OR —</div>

  <div id="choices">
    <button class="choice-btn" id="btn-a" type="button">
      <div class="result-overlay"></div>
      <div class="btn-content">
        <span class="btn-text" id="text-a">Option A</span>
        <span class="btn-pct" id="pct-a"></span>
      </div>
    </button>
    <button class="choice-btn" id="btn-b" type="button">
      <div class="result-overlay"></div>
      <div class="btn-content">
        <span class="btn-text" id="text-b">Option B</span>
        <span class="btn-pct" id="pct-b"></span>
      </div>
    </button>
  </div>

  <div id="consensus"></div>
  <button id="next-btn" type="button">NEXT QUESTION →</button>
</div>

<div id="ov">
  <div id="ov-emoji">🤔</div>
  <div id="ov-title">WOULD YOU RATHER</div>
  <div id="ov-sub">10 QUESTIONS · PICK ONE<br>SEE HOW YOU COMPARE TO EVERYONE ELSE</div>
  <div id="ov-stats">
    <div class="stat-row"><span class="stat-label">Questions</span><span class="stat-val" id="end-q">0</span></div>
    <div class="stat-row"><span class="stat-label">With majority</span><span class="stat-val" id="end-maj">0</span></div>
    <div class="stat-row"><span class="stat-label">With minority</span><span class="stat-val" id="end-min">0</span></div>
    <div class="stat-row"><span class="stat-label">Vibe</span><span class="stat-val" id="end-vibe">–</span></div>
  </div>
  <button id="ov-play" type="button">▶ PLAY</button>
  <button id="ov-share" type="button">📤 SHARE RESULTS</button>
  <div id="ov-copy-toast">✅ COPIED TO CLIPBOARD</div>
</div>

<script>
(function(){
'use strict';

/* ── QUESTIONS ──
   Each has: q (context text), a, b (the two options), pctA (% of people who pick A — simulated)
*/
var QS = [
  /* Funny / silly */
  {q:'Have fingers as long as your arms',               a:'Fingers as long as your arms',          b:'Arms as short as your fingers',           pctA:42},
  {q:'Only speak in song lyrics forever',               a:'Only speak in song lyrics',              b:'Only communicate through memes',           pctA:38},
  {q:'Sweat mayonnaise instead of water',               a:'Sweat mayonnaise',                       b:'Cry ranch dressing',                       pctA:55},
  {q:'Have a pet dinosaur',                             a:'Have a pet dinosaur',                    b:'Have a pet dragon',                        pctA:44},
  {q:'Always have to sing instead of talk',             a:'Always sing instead of talk',             b:'Always dance instead of walk',             pctA:47},
  {q:'Have a rewind button for your life',              a:'Rewind button for your life',             b:'Pause button for time',                    pctA:41},
  {q:'Only eat pizza forever',                          a:'Only eat pizza forever',                  b:'Only eat tacos forever',                   pctA:52},
  {q:'Always be 10 minutes early',                      a:'Always be 10 minutes early',              b:'Always be 10 minutes late',                pctA:68},
  {q:'Have a personal chef',                            a:'Have a personal chef',                    b:'Have a personal driver',                   pctA:61},
  {q:'Never have to sleep',                             a:'Never need to sleep',                     b:'Never need to eat',                        pctA:57},
  {q:'Be able to fly but only 2ft off the ground',      a:'Fly but only 2 feet off the ground',      b:'Be invisible but only when nobody\'s looking', pctA:48},
  {q:'Know every language',                             a:'Know every language',                     b:'Play every instrument perfectly',           pctA:53},
  {q:'Always be too hot',                               a:'Always be too hot',                       b:'Always be too cold',                       pctA:36},
  {q:'Have unlimited battery on your phone',            a:'Unlimited phone battery',                 b:'Unlimited free Wi-Fi everywhere',          pctA:45},
  {q:'Be the funniest person in the room',              a:'Be the funniest person in any room',      b:'Be the smartest person in any room',       pctA:44},

  /* Actually hard */
  {q:'Be famous but broke',                             a:'Be famous but broke',                     b:'Be rich but completely unknown',           pctA:35},
  {q:'Know when you will die',                          a:'Know when you\'re going to die',           b:'Know how you\'re going to die',            pctA:46},
  {q:'Lose all your memories',                          a:'Lose all your memories',                  b:'Never be able to make new ones',           pctA:39},
  {q:'Have no internet for a year',                     a:'No internet for a year',                  b:'No leaving your city for a year',          pctA:52},
  {q:'Always know the truth',                           a:'Always know when someone is lying',       b:'Never be lied to but also never know why', pctA:58},
  {q:'Work your dream job for low pay',                 a:'Work your dream job for low pay',         b:'Work a boring job for huge pay',           pctA:49},
  {q:'Have a photographic memory',                      a:'Have a photographic memory',              b:'Be able to learn any skill in one day',    pctA:47},
  {q:'Be able to talk to animals',                      a:'Talk to animals',                         b:'Talk to the dead',                         pctA:62},
  {q:'Go back to age 10 with your current knowledge',  a:'Go back to age 10 with your memories',    b:'Fast forward 20 years to see your future', pctA:55},
  {q:'Always win every argument',                       a:'Always win every argument',               b:'Always know the right thing to say',       pctA:41},

  /* Pop culture / relatable */
  {q:'Never use TikTok again',                          a:'Never use TikTok again',                  b:'Never use Instagram again',                pctA:44},
  {q:'Have Drake\'s money',                             a:'Have Drake\'s money',                     b:'Have LeBron\'s athletic ability',          pctA:48},
  {q:'Go to the Super Bowl',                            a:'Go to the Super Bowl live',               b:'Go to the NBA Finals live',                pctA:51},
  {q:'Have free Jordans every month',                   a:'Free PS5 every year',                     b:'Free Jordans every month',                 pctA:38},
  {q:'Get paid to play video games',                    a:'Get paid to play video games',            b:'Get paid to watch movies',                 pctA:54},
  {q:'Meet your favorite athlete',                      a:'Meet your favorite athlete',              b:'Meet your favorite musician',              pctA:53},
  {q:'Have front row seats to every game',              a:'Front row seats to every sporting event', b:'Backstage passes to every concert',         pctA:49},
  {q:'Have a closet full of any sneakers you want',     a:'Unlimited sneakers',                      b:'Unlimited designer clothes',               pctA:56},

  /* Gym / lifestyle */
  {q:'Have a perfect physique without ever working out',a:'Perfect physique, never work out',        b:'Grind the gym but never see results',       pctA:71},
  {q:'Eat whatever you want and stay healthy',          a:'Eat whatever you want, stay healthy',     b:'Sleep 4 hours and feel fully rested',      pctA:58},
  {q:'Never be sore after working out',                 a:'Never feel sore after working out',       b:'Never feel tired during a workout',         pctA:52},
  {q:'Have unlimited energy all day',                   a:'Have unlimited energy all day',           b:'Need only 4 hours of sleep',               pctA:61},
  {q:'Run a marathon with no training',                 a:'Run a marathon with no training',         b:'Win one boxing match against a pro',        pctA:39},

  /* Travel / lifestyle */
  {q:'Travel anywhere free for a year',                 a:'Travel anywhere free for one year',       b:'Live rent-free in any city forever',        pctA:46},
  {q:'Fly first class everywhere',                      a:'Fly first class everywhere for free',     b:'Stay in 5-star hotels everywhere for free', pctA:44},
  {q:'Always have perfect weather',                     a:'Always have perfect weather where you are',b:'Never get stuck in traffic',              pctA:48},
  {q:'Live in NYC',                                     a:'Live in NYC',                             b:'Live in LA',                               pctA:47},
  {q:'Have a mansion but no car',                       a:'Have a mansion but no car',               b:'Have a supercar but a small apartment',    pctA:43},
];

var TOTAL_Q   = 10;
var gs        = 'idle';
var qIdx      = 0;
var usedIdx   = [];
var answered  = false;
var withMaj   = 0;
var withMin   = 0;
var currentQ  = null;
var answers   = []; // {q, chose:'a'|'b', pctA}

/* ── DOM ── */
var qCard    = document.getElementById('q-card');
var qText    = document.getElementById('q-text');
var textA    = document.getElementById('text-a');
var textB    = document.getElementById('text-b');
var pctA     = document.getElementById('pct-a');
var pctB     = document.getElementById('pct-b');
var btnA     = document.getElementById('btn-a');
var btnB     = document.getElementById('btn-b');
var nextBtn  = document.getElementById('next-btn');
var consensus= document.getElementById('consensus');
var progFill = document.getElementById('prog-fill');
var qCounter = document.getElementById('q-counter');

/* ── LOAD QUESTION ── */
function loadQuestion(){
  answered = false;
  nextBtn.classList.remove('show');
  consensus.textContent = '';
  btnA.className = 'choice-btn'; btnB.className = 'choice-btn';
  pctA.style.opacity='0'; pctB.style.opacity='0';
  btnA.querySelector('.result-overlay').style.opacity='0';
  btnB.querySelector('.result-overlay').style.opacity='0';
  btnA.querySelector('.result-overlay').style.width='0%';
  btnB.querySelector('.result-overlay').style.width='0%';
  btnA.disabled=false; btnB.disabled=false;

  /* pick unused */
  var pool=[];
  for(var i=0;i<QS.length;i++) if(usedIdx.indexOf(i)===-1) pool.push(i);
  if(pool.length===0){ usedIdx=[]; pool=QS.map(function(_,i){return i;}); }
  var pick = pool[Math.floor(Math.random()*pool.length)];
  usedIdx.push(pick);
  currentQ = QS[pick];

  /* fade in */
  qCard.classList.add('fade');
  setTimeout(function(){
    qText.textContent = 'Would you rather...';
    textA.textContent = currentQ.a;
    textB.textContent = currentQ.b;
    qCounter.textContent = qIdx+1 + ' / ' + TOTAL_Q;
    progFill.style.width = (qIdx/TOTAL_Q*100)+'%';
    qCard.classList.remove('fade');
  }, 200);
}

/* ── PICK ── */
function pick(choice){
  if(answered) return;
  answered = true;
  btnA.disabled=true; btnB.disabled=true;

  var pA = currentQ.pctA;
  var pB = 100 - pA;

  /* simulate slight randomness in displayed % */
  var jitter = Math.round((Math.random()-0.5)*4);
  pA = Math.max(5, Math.min(95, pA+jitter));
  pB = 100-pA;

  var choseMajority = (choice==='a' && pA>=50) || (choice==='b' && pB>=50);
  if(choseMajority) withMaj++; else withMin++;
  answers.push({q:currentQ, chose:choice, pA:pA, pB:pB});

  /* highlight chosen */
  if(choice==='a'){btnA.classList.add('chosen');if(choseMajority)btnA.classList.add('majority');}
  else            {btnB.classList.add('chosen');if(choseMajority)btnB.classList.add('majority');}

  /* animate bars */
  setTimeout(function(){
    pctA.textContent=pA+'%'; pctB.textContent=pB+'%';
    pctA.style.opacity='1'; pctB.style.opacity='1';
    btnA.querySelector('.result-overlay').style.width=pA+'%';
    btnA.querySelector('.result-overlay').style.opacity='1';
    btnB.querySelector('.result-overlay').style.width=pB+'%';
    btnB.querySelector('.result-overlay').style.opacity='1';

    /* consensus line */
    var majPct   = Math.max(pA,pB);
    var majSide  = pA>=pB?'A':'B';
    var yourSide = choice.toUpperCase();
    if(choseMajority){
      consensus.innerHTML='<span class="highlight">'+majPct+'%</span> of people agree with you 🔥';
    } else {
      consensus.innerHTML='Only <span class="highlight">'+Math.min(pA,pB)+'%</span> agree with you — rare pick 😤';
    }
  }, 150);

  setTimeout(function(){ nextBtn.classList.add('show'); }, 600);
}

btnA.addEventListener('click',function(){ pick('a'); });
btnB.addEventListener('click',function(){ pick('b'); });
btnA.addEventListener('touchend',function(e){e.preventDefault();pick('a');},{passive:false});
btnB.addEventListener('touchend',function(e){e.preventDefault();pick('b');},{passive:false});

nextBtn.addEventListener('click', advance);
nextBtn.addEventListener('touchend',function(e){e.preventDefault();advance();},{passive:false});

function advance(){
  qIdx++;
  if(qIdx>=TOTAL_Q){ endGame(); return; }
  loadQuestion();
}

/* ── END ── */
function endGame(){
  gs='done';
  var vibe;
  var majPct=Math.round((withMaj/TOTAL_Q)*100);
  if(majPct>=80)       vibe='Basic 😂';
  else if(majPct>=60)  vibe='Pretty Normal';
  else if(majPct>=40)  vibe='Balanced 🤝';
  else if(majPct>=20)  vibe='Unique 🧠';
  else                 vibe='Wildcard 🤯';

  document.getElementById('ov-emoji').textContent='🏆';
  document.getElementById('ov-title').textContent='DONE!';
  document.getElementById('ov-sub').innerHTML='You agreed with the majority<br><span class="big">'+withMaj+' / '+TOTAL_Q+'</span> times';
  document.getElementById('end-q').textContent=TOTAL_Q;
  document.getElementById('end-maj').textContent=withMaj+' times';
  document.getElementById('end-min').textContent=withMin+' times';
  document.getElementById('end-vibe').textContent=vibe;
  document.getElementById('ov-stats').style.display='block';
  document.getElementById('ov-play').textContent='PLAY AGAIN';

  /* share */
  var shareBtn=document.getElementById('ov-share');
  shareBtn.style.display='block';
  shareBtn.onclick=function(){
    var txt='🤔 WOULD YOU RATHER\nAgreed with majority: '+withMaj+'/'+TOTAL_Q+'\nVibe: '+vibe+'\nPlay at boltgame.netlify.app';
    if(navigator.share){navigator.share({text:txt});}
    else{navigator.clipboard.writeText(txt).then(function(){
      var t=document.getElementById('ov-copy-toast');t.style.display='block';
      setTimeout(function(){t.style.display='none';},2000);
    });}
  };

  progFill.style.width='100%';
  document.getElementById('ov').classList.remove('hidden');
}

/* ── START ── */
function startGame(){
  gs='run'; qIdx=0; withMaj=0; withMin=0; answers=[];
  usedIdx=[];
  document.getElementById('ov-stats').style.display='none';
  document.getElementById('ov-share').style.display='none';
  document.getElementById('ov-copy-toast').style.display='none';
  document.getElementById('ov').classList.add('hidden');
  loadQuestion();
}

document.getElementById('ov-play').addEventListener('click',startGame);
document.getElementById('ov-play').addEventListener('touchend',function(e){e.preventDefault();startGame();},{passive:false});

/* show start overlay */
document.getElementById('ov').classList.remove('hidden');

}());
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SQUADS — BOLT ARCADE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;500;600;700&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{min-height:100vh;background:#08080f;font-family:'Inter',sans-serif;color:#fff;overflow-x:hidden;display:flex;flex-direction:column;align-items:center;}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;}
#page{position:relative;z-index:1;width:100%;max-width:480px;padding:0 16px 60px;display:flex;flex-direction:column;align-items:center;min-height:100vh;}

header{display:flex;align-items:center;justify-content:space-between;width:100%;padding:20px 0 0;}
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.35);text-decoration:none;transition:color 0.2s;}
.back-btn:hover{color:rgba(255,255,255,0.7);}
.back-btn svg{width:16px;height:16px;}
.header-logo{font-family:'Russo One',sans-serif;font-size:13px;letter-spacing:0.22em;background:linear-gradient(90deg,#f9c846,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.daily-badge{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:4px 10px;}

.game-title{font-family:'Russo One',sans-serif;font-size:clamp(36px,10vw,52px);letter-spacing:0.12em;text-align:center;margin:18px 0 2px;background:linear-gradient(160deg,#f9c846,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.game-sub{text-align:center;font-size:12px;letter-spacing:0.25em;text-transform:uppercase;color:rgba(255,255,255,0.2);margin-bottom:6px;}
.game-hint{text-align:center;font-size:11px;color:rgba(255,255,255,0.18);margin-bottom:14px;}

.streak-bar{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:14px;font-size:13px;color:rgba(255,255,255,0.3);letter-spacing:0.1em;}
.streak-num{font-family:'Russo One',sans-serif;font-size:18px;background:linear-gradient(90deg,#f9c846,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* LIVES */
.lives-row{display:flex;align-items:center;justify-content:space-between;width:100%;margin-bottom:12px;}
.lives{display:flex;gap:5px;}
.life-dot{width:12px;height:12px;border-radius:50%;background:#f9c846;transition:all 0.3s;}
.life-dot.lost{background:rgba(255,255,255,0.1);}
.sel-count{font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.3);}

/* SOLVED ROWS */
#solved-rows{width:100%;display:flex;flex-direction:column;gap:6px;margin-bottom:6px;}
.solved-row{width:100%;border-radius:10px;padding:12px 16px;display:flex;flex-direction:column;align-items:center;gap:2px;animation:solvedPop 0.4s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes solvedPop{from{opacity:0;transform:scale(0.95);}to{opacity:1;transform:scale(1);}}
.solved-row.yellow{background:#b59f3b;}
.solved-row.green{background:#538d4e;}
.solved-row.blue{background:#3b82f6;}
.solved-row.purple{background:#7c3aed;}
.solved-category{font-family:'Russo One',sans-serif;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#fff;}
.solved-members{font-size:12px;color:rgba(255,255,255,0.75);text-align:center;}

/* GRID */
#grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;width:100%;margin-bottom:14px;}
.card{
  aspect-ratio:1/1;
  border-radius:10px;
  background:#1a1a2e;
  border:2px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;
  text-align:center;
  font-family:'Inter',sans-serif;
  font-size:clamp(9px,2.5vw,12px);
  font-weight:700;
  letter-spacing:0.03em;
  padding:4px;
  cursor:pointer;
  transition:background 0.15s,border-color 0.15s,transform 0.1s;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  line-height:1.2;
}
.card:active{transform:scale(0.94);}
.card.selected{background:#3a3a5c;border-color:rgba(249,200,70,0.6);color:#f9c846;}
.card.shake{animation:cardShake 0.4s ease;}
@keyframes cardShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
.card.correct-flash{animation:correctFlash 0.5s ease;}
@keyframes correctFlash{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
.card.gone{opacity:0;pointer-events:none;transition:opacity 0.3s;}

/* MESSAGE */
#message{height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:10px;font-weight:700;}

/* BUTTONS */
.btn-row{display:flex;gap:8px;width:100%;margin-bottom:8px;}
#submit-btn{flex:1;padding:14px;background:linear-gradient(90deg,#f9c846,#f97316);border:none;border-radius:12px;font-family:'Russo One',sans-serif;font-size:14px;letter-spacing:0.15em;color:#08080f;cursor:pointer;transition:opacity 0.2s,transform 0.1s;}
#submit-btn:active{transform:scale(0.97);}
#submit-btn:disabled{opacity:0.3;cursor:not-allowed;}
#deselect-btn{padding:14px 18px;background:transparent;border:1px solid rgba(255,255,255,0.12);border-radius:12px;font-family:'Russo One',sans-serif;font-size:12px;letter-spacing:0.12em;color:rgba(255,255,255,0.4);cursor:pointer;transition:all 0.2s;}
#deselect-btn:hover{border-color:rgba(255,255,255,0.25);color:rgba(255,255,255,0.7);}
#shuffle-btn{padding:14px 18px;background:transparent;border:1px solid rgba(255,255,255,0.12);border-radius:12px;font-size:18px;cursor:pointer;transition:all 0.2s;}
#shuffle-btn:hover{border-color:rgba(255,255,255,0.25);}

#giveup-btn{width:100%;padding:12px;background:transparent;border:1px solid rgba(249,64,96,0.2);border-radius:12px;font-size:13px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(249,64,96,0.4);cursor:pointer;margin-top:4px;transition:all 0.2s;}
#giveup-btn:hover{border-color:rgba(249,64,96,0.45);color:rgba(249,64,96,0.7);}

/* RESULT */
#result-overlay{position:fixed;inset:0;z-index:100;background:rgba(8,8,15,0.96);display:flex;align-items:center;justify-content:center;flex-direction:column;padding:24px;opacity:0;pointer-events:none;transition:opacity 0.3s;overflow-y:auto;}
#result-overlay.show{opacity:1;pointer-events:all;}
.result-icon{font-size:60px;margin-bottom:12px;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes popIn{from{transform:scale(0);}to{transform:scale(1);}}
.result-label{font-family:'Russo One',sans-serif;font-size:clamp(26px,8vw,42px);letter-spacing:0.08em;text-align:center;margin-bottom:16px;}
.result-label.win{background:linear-gradient(90deg,#f9c846,#22c55e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.result-label.lose{background:linear-gradient(90deg,#f94060,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* Result groups */
.result-groups{display:flex;flex-direction:column;gap:8px;width:100%;max-width:360px;margin-bottom:16px;}
.rg-row{border-radius:10px;padding:10px 14px;display:flex;flex-direction:column;align-items:center;gap:2px;}
.rg-row.yellow{background:#b59f3b;}.rg-row.green{background:#538d4e;}.rg-row.blue{background:#3b82f6;}.rg-row.purple{background:#7c3aed;}
.rg-cat{font-family:'Russo One',sans-serif;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;}
.rg-mem{font-size:11px;color:rgba(255,255,255,0.75);}

/* share grid */
.share-grid{display:flex;flex-direction:column;gap:3px;margin-bottom:16px;}
.share-row{display:flex;gap:3px;}
.sq{width:18px;height:18px;border-radius:3px;}
.sq.yellow{background:#b59f3b;}.sq.green{background:#538d4e;}.sq.blue{background:#3b82f6;}.sq.purple{background:#7c3aed;}.sq.wrong{background:#2a2a3e;}

.result-guesses{font-family:'Russo One',sans-serif;font-size:40px;background:linear-gradient(90deg,#f9c846,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:2px;}
.result-guesses-label{font-size:12px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.25);margin-bottom:6px;}
.comeback{font-size:13px;color:rgba(255,255,255,0.3);margin-bottom:20px;}
.share-btn{width:100%;max-width:320px;padding:14px;background:linear-gradient(90deg,#f9c846,#f97316);border:none;border-radius:12px;font-family:'Russo One',sans-serif;font-size:14px;letter-spacing:0.15em;color:#08080f;cursor:pointer;margin-bottom:10px;}
.home-btn{width:100%;max-width:320px;padding:12px;background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:12px;font-size:13px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.4);cursor:pointer;text-decoration:none;display:block;text-align:center;}
</style>
</head>

<script>
// BG
const bgC=document.getElementById('bg'),bgX=bgC.getContext('2d');let stars=[];
function initBg(){bgC.width=innerWidth;bgC.height=innerHeight;stars=Array.from({length:80},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.5+0.3,a:Math.random(),s:Math.random()*0.005+0.002}));}
function drawBg(){bgX.clearRect(0,0,bgC.width,bgC.height);stars.forEach(s=>{s.a+=s.s;if(s.a>1||s.a<0)s.s*=-1;bgX.globalAlpha=s.a*0.4;bgX.fillStyle='#f9c846';bgX.beginPath();bgX.arc(s.x,s.y,s.r,0,Math.PI*2);bgX.fill();});bgX.globalAlpha=1;requestAnimationFrame(drawBg);}
initBg();drawBg();window.addEventListener('resize',initBg);

// ── PUZZLES ──
const PUZZLES = [
  {
    groups:[

      {color:'green',  category:'Point Guards', members:['Curry','Lillard','CP3','Trae']},

  },
  {

  },

      {color:'blue',   category:'1996 NBA Draft Class', members:['Kobe','Nash','Iverson','Ray']},

    ]
  },
  {
    groups:[

      {color:'green',  category:'Centers', members:['Jokic','Embiid','Gobert','KAT']},

  },
  {

      {color:'green',  category:'Small Forwards', members:['Durant','LeBron','Tatum','Kawhi']},
      {color:'blue',   category:'European Stars', members:['Doncic','Jokic','Ginobili','Dirk']},
      {color:'purple', category:'Infamous Suspensions', members:['Artest','Jokic','Draymond','Westbrook']},
    ]
  },
  {
    groups:[
      {color:'yellow', category:'Chicago Bulls 90s Dynasty', members:['Jordan','Pippen','Rodman','Harper']},
      {color:'green',  category:'Power Forwards', members:['Giannis','Durant','Rodman','KP']},
      {color:'blue',   category:'Triple Double Kings', members:['Westbrook','Magic','Oscar','LeBron']},
      {color:'purple', category:'Changed Their Name', members:['Metta','Melo','Mahmoud','Kareem']},
    ]
  },
  {
    groups:[
      {color:'yellow', category:'Dallas Mavericks', members:['Doncic','Dirk','Kidd','Finley']},
      {color:'green',  category:'Defensive Players of Year', members:['Giannis','Ben','Rudy','Kawhi']},
      {color:'blue',   category:'Drafted Out of High School', members:['Kobe','LeBron','KG','Tracy']},
      {color:'purple', category:'Started a Podcast', members:['JJ','Paul','KD','Shaq']},
    ]
  },
  {
    groups:[

      {color:'green',  category:'Hall of Fame Point Guards', members:['Magic','Isiah','Stockton','Nash']},
      {color:'blue',   category:'Won Finals MVP as Underdog', members:['Chauncey','Kawhi','Leonard','Iggy']},
      {color:'purple', category:'Famous Shoe Deals', members:['Jordan','LeBron','Kobe','KD']},
    ]
  },
  {
    groups:[
      {color:'yellow', category:'Oklahoma City Thunder Core', members:['Durant','Westbrook','Harden','Ibaka']},
      {color:'green',  category:'Scoring Champions', members:['Jordan','Kobe','Iverson','Durant']},
      {color:'blue',   category:'Went to Same High School', members:['LeBron','Romeo','Dru','Sian']},

    ]
  },
  {

      {color:'green',  category:'Rookies of the Year 2000s', members:['LeBron','Melo','Chris','Dwyane']},
      {color:'blue',   category:'Wore #34', members:['Giannis','Shaq','Hakeem','Pierce']},

      {color:'blue',   category:'Canadian NBA Players', members:['Nash','Wiggins','Jamal','Tristan']},

    ]
  },

    groups:[
      {color:'yellow', category:'Memphis Grizzlies Grit & Grind', members:['Gasol','Conley','Randolph','Tony']},
      {color:'green',  category:'Sixth Man of the Year Winners', members:['Harden','Lou','Lamar','Jamal']},
      {color:'blue',   category:'Went #1 Overall Then Busted', members:['Kwame','Olowokandi','Hasheem','Greg']},

// ── EST DATE ──
function getESTDateKey(){
  const now=new Date();
  const jan=new Date(now.getFullYear(),0,1).getTimezoneOffset();
  const jul=new Date(now.getFullYear(),6,1).getTimezoneOffset();
  const isDST=now.getTimezoneOffset()<Math.max(jan,jul);
  const offsetMin=-5*60+(isDST?60:0);
  const estTime=new Date(now.getTime()+(now.getTimezoneOffset()+offsetMin)*60000);
  return estTime.toISOString().slice(0,10);
}
function getDayIndex(){
  const start=new Date('2024-01-01');
  const now=new Date(getESTDateKey());
  return Math.floor((now-start)/(1000*60*60*24))%PUZZLES.length;
}

const todayPuzzle=PUZZLES[getDayIndex()];
const dateKey=getESTDateKey();
const storageKey=`squads_${dateKey}`;

// ── STATE ──
let lives=4;
let selected=[];
let solved=[]; // array of color strings solved
let gameOver=false;
let won=false;
let guessHistory=[]; // array of arrays of colors (for share)
let tiles=[]; // current tile order

const saved=localStorage.getItem(storageKey);
if(saved){
  const s=JSON.parse(saved);
  lives=s.lives??4;solved=s.solved||[];gameOver=s.gameOver||false;won=s.won||false;guessHistory=s.guessHistory||[];
}

// ── STREAK ──
function getStreak(){return parseInt(localStorage.getItem('squads_streak')||'0');}
function updateStreak(w){
  const yesterday=new Date(getESTDateKey());yesterday.setDate(yesterday.getDate()-1);
  const yk=yesterday.toISOString().slice(0,10);
  const lastWin=localStorage.getItem('squads_lastwin');
  let streak=getStreak();
  if(w){if(lastWin===yk)streak++;else if(lastWin===dateKey){}else streak=1;localStorage.setItem('squads_lastwin',dateKey);localStorage.setItem('squads_streak',streak);}
  else{localStorage.setItem('squads_streak','0');}
  return streak;
}
document.getElementById('streak-display').textContent=getStreak();

// ── BUILD TILES ──
function getAllMembers(){
  return todayPuzzle.groups.flatMap(g=>g.members.map(m=>({name:m,color:g.color})));
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function buildTiles(){
  const all=getAllMembers();
  // Remove already solved
  tiles=shuffle(all.filter(t=>!solved.includes(t.color)));
}

function renderGrid(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  tiles.forEach(tile=>{
    const card=document.createElement('div');
    card.className='card';
    card.textContent=tile.name;
    card.dataset.name=tile.name;
    card.dataset.color=tile.color;
    if(selected.includes(tile.name))card.classList.add('selected');
    card.addEventListener('click',()=>toggleSelect(tile.name,card));
    grid.appendChild(card);
  });
}

function renderSolvedRows(){
  const el=document.getElementById('solved-rows');
  el.innerHTML='';
  solved.forEach(color=>{
    const group=todayPuzzle.groups.find(g=>g.color===color);
    if(!group)return;
    const row=document.createElement('div');
    row.className=`solved-row ${color}`;
    row.innerHTML=`<div class="solved-category">${group.category}</div><div class="solved-members">${group.members.join(' · ')}</div>`;
    el.appendChild(row);
  });
}

function renderLives(){
  const el=document.getElementById('lives-display');
  el.innerHTML=Array.from({length:4},(_,i)=>`<div class="life-dot${i>=lives?' lost':''}"></div>`).join('');
}

function renderSelCount(){
  document.getElementById('sel-count').textContent=`${selected.length} / 4 SELECTED`;
  document.getElementById('submit-btn').disabled=selected.length!==4||gameOver;
}

function showMsg(txt,dur=2000){
  const el=document.getElementById('message');
  el.textContent=txt;
  if(dur>0)setTimeout(()=>{if(el.textContent===txt)el.textContent='';},dur);
}

function toggleSelect(name,card){
  if(gameOver)return;
  const idx=selected.indexOf(name);
  if(idx===-1){
    if(selected.length>=4)return;
    selected.push(name);
    card.classList.add('selected');
  } else {
    selected.splice(idx,1);
    card.classList.remove('selected');
  }
  renderSelCount();
}

function saveState(){localStorage.setItem(storageKey,JSON.stringify({lives,solved,gameOver,won,guessHistory}));}

function submitGuess(){
  if(selected.length!==4||gameOver)return;
  // Find which group each selected belongs to
  const colors=selected.map(name=>{
    const group=todayPuzzle.groups.find(g=>g.members.includes(name));
    return group?group.color:null;
  });
  const allSameColor=colors.every(c=>c===colors[0]);

  // Record guess for share
  guessHistory.push(colors);

  if(allSameColor){
    const color=colors[0];
    // Flash correct
    document.querySelectorAll('.card.selected').forEach((card,i)=>{
      setTimeout(()=>card.classList.add('correct-flash'),i*60);
    });
    setTimeout(()=>{
      solved.push(color);
      selected=[];
      buildTiles();
      renderSolvedRows();
      renderGrid();
      renderSelCount();
      if(solved.length===4){won=true;gameOver=true;saveState();setTimeout(showResult,600);}
      else{showMsg('CORRECT! Keep going 🔥');}
      saveState();
    },400);
  } else {
    // Check if one away
    const colorCounts={};
    colors.forEach(c=>{colorCounts[c]=(colorCounts[c]||0)+1;});
    const maxCount=Math.max(...Object.values(colorCounts));

    lives--;
    renderLives();
    // Shake wrong cards
    document.querySelectorAll('.card.selected').forEach(card=>card.classList.add('shake'));
    setTimeout(()=>document.querySelectorAll('.card').forEach(c=>c.classList.remove('shake')),400);

    if(maxCount===3)showMsg('ONE AWAY... 👀');
    else showMsg('NOT A SQUAD 😤');

    if(lives<=0){gameOver=true;won=false;saveState();setTimeout(showResult,800);}
    selected=[];
    renderGrid();
    renderSelCount();
    saveState();
  }
}

document.getElementById('submit-btn').addEventListener('click',submitGuess);
document.getElementById('deselect-btn').addEventListener('click',()=>{
  selected=[];renderGrid();renderSelCount();
});
document.getElementById('shuffle-btn').addEventListener('click',()=>{
  tiles=shuffle(tiles);selected=[];renderGrid();renderSelCount();
});
document.getElementById('giveup-btn').addEventListener('click',()=>{
  if(gameOver)return;
  gameOver=true;won=false;saveState();showResult();
});

// ── RESULT ──
function buildResultGroups(){
  const el=document.getElementById('result-groups');
  el.innerHTML=todayPuzzle.groups.map(g=>`
    <div class="rg-row ${g.color}">
      <div class="rg-cat">${g.category}</div>
      <div class="rg-mem">${g.members.join(' · ')}</div>
    </div>
  `).join('');
}

function buildShareGrid(){
  const colorEmoji={yellow:'🟨',green:'🟩',blue:'🟦',purple:'🟪',wrong:'⬛'};
  const el=document.getElementById('share-grid');
  el.innerHTML=guessHistory.map(guess=>{
    const allSame=guess.every(c=>c===guess[0]);
    return `<div class="share-row">${guess.map(c=>`<div class="sq ${allSame?c:'wrong'}"></div>`).join('')}</div>`;
  }).join('');
  // emoji version for sharing
  return guessHistory.map(guess=>{
    const allSame=guess.every(c=>c===guess[0]);
    return guess.map(c=>allSame?colorEmoji[c]:colorEmoji.wrong).join('');
  }).join('\n');
}

function showResult(){
  buildResultGroups();
  const shareText=buildShareGrid();
  document.getElementById('result-icon').textContent=won?'🏆':'😤';
  document.getElementById('result-label').textContent=won?'GOT THE SQUADS!':'GAME OVER';
  document.getElementById('result-label').className=`result-label ${won?'win':'lose'}`;
  const correctGroups=solved.length;
  document.getElementById('result-guesses').textContent=`${correctGroups}/4`;
  document.getElementById('result-guesses-label').textContent='GROUPS FOUND';
  const streak=updateStreak(won);
  document.getElementById('comeback-txt').textContent=won?`🔥 ${streak} day streak!`:'Come back tomorrow';

  document.getElementById('share-btn').addEventListener('click',()=>{
    const text=`🏀 SQUADS\n${dateKey}\n${shareText}\n${correctGroups}/4 groups\n▶ https://boltarcade.github.io/BoltArcade`;
    if(navigator.share)navigator.share({text});
    else navigator.clipboard.writeText(text).then(()=>alert('Copied!'));
  });

  document.getElementById('result-overlay').classList.add('show');
}

// ── INIT ──
buildTiles();
renderSolvedRows();
renderGrid();
renderLives();
renderSelCount();
if(gameOver)setTimeout(showResult,300);
</script>

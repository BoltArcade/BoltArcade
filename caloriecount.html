<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>CALORIE COUNT</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Nunito:wght@700;900&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;}
body{display:flex;flex-direction:column;align-items:center;justify-content:space-between;touch-action:pan-y;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;font-family:'Nunito',sans-serif;color:#fff;background:#0a0a0a;padding:env(safe-area-inset-top,6px) 0 env(safe-area-inset-bottom,6px);height:100vh;height:100dvh;}
#header{flex-shrink:0;width:min(96vw,500px);display:flex;align-items:center;justify-content:space-between;padding:2px 6px 0;}
#back{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.3);text-decoration:none;min-width:50px;font-weight:700;}
#hdc{text-align:center;}
#title{font-family:'Russo One',sans-serif;font-size:clamp(16px,4.5vw,22px);letter-spacing:0.1em;background:linear-gradient(90deg,#f97316,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#tagline{font-size:8px;color:rgba(255,255,255,0.2);letter-spacing:0.25em;text-transform:uppercase;}
#hdr{min-width:50px;text-align:right;}
#lives-disp{font-size:18px;letter-spacing:2px;}
#game-area{flex:1 1 auto;width:min(96vw,500px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:4px 8px;min-height:0;}
#progress-bar{width:100%;height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;flex-shrink:0;}
#progress-fill{height:100%;background:linear-gradient(90deg,#f97316,#ef4444);border-radius:3px;transition:width 0.4s;}
#round-label{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:0.2em;text-transform:uppercase;text-align:right;width:100%;}
#item-card{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;}
#item-emoji{font-size:clamp(44px,13vw,68px);line-height:1;text-align:center;}
#item-name{font-family:'Russo One',sans-serif;font-size:clamp(15px,4.5vw,20px);letter-spacing:0.08em;text-align:center;color:#fff;}
#item-desc{font-size:clamp(10px,2.8vw,12px);color:rgba(255,255,255,0.35);letter-spacing:0.08em;text-align:center;}
#item-hint{font-size:clamp(9px,2.2vw,11px);color:rgba(255,200,80,0.5);letter-spacing:0.1em;text-align:center;font-style:italic;}
#cal-display{font-family:'Russo One',sans-serif;font-size:clamp(30px,9vw,50px);letter-spacing:0.05em;color:#f97316;text-shadow:0 0 20px rgba(249,115,22,0.4);text-align:center;flex-shrink:0;}
#slider-wrap{width:100%;flex-shrink:0;}
#cal-slider{width:100%;-webkit-appearance:none;appearance:none;height:8px;border-radius:4px;background:rgba(255,255,255,0.1);outline:none;cursor:pointer;}
#cal-slider::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#f97316,#ef4444);box-shadow:0 0 12px rgba(249,115,22,0.5);cursor:pointer;}
#cal-slider::-moz-range-thumb{width:28px;height:28px;border-radius:50%;border:none;background:linear-gradient(135deg,#f97316,#ef4444);cursor:pointer;}
#slider-labels{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,0.25);letter-spacing:0.1em;margin-top:4px;padding:0 2px;}
#submit-btn{width:100%;padding:14px 0;flex-shrink:0;background:linear-gradient(90deg,#f97316,#ef4444);border:none;border-radius:12px;color:#fff;font-family:'Russo One',sans-serif;font-size:clamp(14px,4vw,17px);letter-spacing:0.15em;cursor:pointer;-webkit-appearance:none;appearance:none;outline:none;touch-action:manipulation;box-shadow:0 4px 20px rgba(249,115,22,0.35);transition:transform 0.07s,opacity 0.15s;}
#submit-btn:active{transform:scale(0.97);}
#submit-btn:disabled{opacity:0.4;pointer-events:none;}
#result-panel{width:100%;background:rgba(255,255,255,0.04);border-radius:12px;padding:14px;text-align:center;flex-shrink:0;display:none;}
#result-title{font-family:'Russo One',sans-serif;font-size:clamp(18px,5.5vw,26px);letter-spacing:0.1em;margin-bottom:4px;}
#result-detail{font-size:clamp(11px,3vw,13px);color:rgba(255,255,255,0.5);letter-spacing:0.1em;line-height:1.6;}
#result-pts{font-family:'Russo One',sans-serif;font-size:clamp(16px,4.5vw,22px);margin-top:6px;}
#next-btn{margin-top:10px;width:100%;padding:12px 0;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:#fff;font-family:'Russo One',sans-serif;font-size:clamp(12px,3.5vw,15px);letter-spacing:0.15em;cursor:pointer;-webkit-appearance:none;appearance:none;outline:none;touch-action:manipulation;}
#ov{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(5,5,5,0.96);transition:opacity 0.25s;pointer-events:auto;padding:20px;}
#ov.hidden{opacity:0;pointer-events:none;}
#ov-emoji{font-size:clamp(40px,12vw,64px);}
#ov-title{font-family:'Russo One',sans-serif;font-size:clamp(24px,7vw,42px);letter-spacing:0.1em;background:linear-gradient(90deg,#f97316,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;}
#ov-sub{font-size:clamp(11px,3vw,14px);color:rgba(255,255,255,0.38);letter-spacing:0.08em;text-align:center;padding:0 16px;line-height:1.7;font-weight:700;}
#ov-sub .big{font-family:'Russo One',sans-serif;font-size:clamp(20px,5.5vw,28px);color:#f97316;-webkit-text-fill-color:#f97316;vertical-align:middle;}
#ov-play{background:linear-gradient(90deg,#f97316,#ef4444);border:none;border-radius:12px;color:#fff;font-family:'Russo One',sans-serif;font-size:clamp(14px,4vw,17px);letter-spacing:0.15em;padding:13px 44px;cursor:pointer;-webkit-appearance:none;appearance:none;outline:none;touch-action:manipulation;box-shadow:0 4px 22px rgba(249,115,22,0.4);transition:transform 0.07s;}
#ov-play:active{transform:scale(0.95);}
#ov-share{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);border-radius:10px;color:#fff;font-family:'Russo One',sans-serif;font-size:clamp(12px,3.2vw,14px);letter-spacing:0.15em;padding:11px 32px;cursor:pointer;-webkit-appearance:none;appearance:none;outline:none;touch-action:manipulation;display:none;}
#ov-copy{font-size:11px;color:#06d6a0;letter-spacing:0.15em;display:none;}
</style>
</head>
<body>
<div id="header">
  <a id="back" href="index.html">← ARCADE</a>
  <div id="hdc"><div id="title">🔥 CALORIE COUNT</div><div id="tagline">guess the calories</div></div>
  <div id="hdr"><div id="lives-disp">❤️❤️❤️</div></div>
</div>
<div id="game-area">
  <div id="round-label">ROUND 1 / 10</div>
  <div id="progress-bar"><div id="progress-fill" style="width:10%"></div></div>
  <div id="item-card">
    <div id="item-emoji">🍕</div>
    <div id="item-name">Loading...</div>
    <div id="item-desc"></div>
    <div id="item-hint"></div>
  </div>
  <div id="cal-display">0 cal</div>
  <div id="slider-wrap">
    <input type="range" id="cal-slider" min="0" max="100" value="30" step="1">
    <div id="slider-labels"><span>0</span><span id="sl-max">1000</span></div>
  </div>
  <button id="submit-btn" type="button">🔥 SUBMIT GUESS</button>
  <div id="result-panel">
    <div id="result-title"></div>
    <div id="result-detail"></div>
    <div id="result-pts"></div>
    <button id="next-btn" type="button">NEXT →</button>
  </div>
</div>
<div id="ov">
  <div id="ov-emoji">🔥</div>
  <div id="ov-title">CALORIE COUNT</div>
  <div id="ov-sub">GUESS THE CALORIES<br>DON'T GO MORE THAN 50 OVER<br>10 ITEMS · 3 LIVES</div>
  <button id="ov-play" type="button">▶ START</button>
  <button id="ov-share" type="button">📤 SHARE RESULT</button>
  <div id="ov-copy">✅ COPIED!</div>
</div>
<script>
(function(){
'use strict';
var ITEMS=[
  {emoji:'🍎',name:'Apple',desc:'Medium apple, raw',hint:'Common fruit',cal:95,max:400},
  {emoji:'🍌',name:'Banana',desc:'Medium banana',hint:'Yellow fruit',cal:105,max:400},
  {emoji:'🍕',name:'Pizza Slice',desc:'One slice cheese pizza (Domino\'s)',hint:'Large pizza slice',cal:285,max:700},
  {emoji:'🍔',name:'Big Mac',desc:'McDonald\'s Big Mac',hint:'No fries',cal:550,max:1200},
  {emoji:'🍟',name:'Large Fries',desc:'McDonald\'s large fries',hint:'Supersized',cal:490,max:1000},
  {emoji:'🌮',name:'Chipotle Burrito',desc:'Chicken burrito with rice & beans',hint:'Standard build',cal:925,max:2000},
  {emoji:'🥗',name:'Caesar Salad',desc:'Full Caesar with croutons & dressing',hint:'Restaurant size',cal:470,max:1000},
  {emoji:'🍜',name:'Ramen Bowl',desc:'Tonkotsu ramen, restaurant serving',hint:'Full bowl',cal:650,max:1500},
  {emoji:'🥐',name:'Croissant',desc:'Butter croissant, Starbucks',hint:'Plain, no filling',cal:260,max:600},
  {emoji:'🍩',name:'Glazed Donut',desc:'Krispy Kreme original glazed',hint:'Single donut',cal:190,max:500},
  {emoji:'🧁',name:'Cupcake',desc:'Chocolate cupcake with frosting',hint:'Standard bakery size',cal:350,max:700},
  {emoji:'🍦',name:'Ice Cream Cone',desc:'McDonald\'s vanilla soft serve',hint:'Small cone',cal:200,max:500},
  {emoji:'🥤',name:'Coca-Cola',desc:'20oz bottle of Coke',hint:'Classic size',cal:240,max:600},
  {emoji:'🧃',name:'Orange Juice',desc:'16oz glass of OJ',hint:'Not diet',cal:220,max:500},
  {emoji:'☕',name:'Frappuccino',desc:'Starbucks Grande Caramel Frappuccino',hint:'With whip',cal:420,max:900},
  {emoji:'🥩',name:'Ribeye Steak',desc:'12oz ribeye, grilled',hint:'Bone-in',cal:850,max:1800},
  {emoji:'🍗',name:'Fried Chicken',desc:'KFC original recipe breast',hint:'One piece',cal:320,max:700},
  {emoji:'🥞',name:'Pancakes',desc:'Short stack (3) at IHOP with syrup',hint:'With butter & syrup',cal:590,max:1200},
  {emoji:'🥓',name:'Bacon & Eggs',desc:'3 strips bacon + 2 scrambled eggs',hint:'Classic breakfast',cal:380,max:800},
  {emoji:'🌯',name:'Subway Footlong',desc:'12" Turkey sub with veggies',hint:'No cheese or sauce',cal:500,max:1100},
  {emoji:'🍱',name:'Sushi Roll',desc:'8-piece California roll',hint:'Standard size',cal:255,max:600},
  {emoji:'🥙',name:'Gyro Wrap',desc:'Lamb gyro with tzatziki',hint:'Restaurant serving',cal:540,max:1100},
  {emoji:'🍝',name:'Spaghetti Bolognese',desc:'Restaurant serving with meat sauce',hint:'Full plate',cal:670,max:1400},
  {emoji:'🫕',name:'Chili Bowl',desc:'Bowl of beef chili, no toppings',hint:'Restaurant size',cal:390,max:800},
  {emoji:'🥜',name:'Peanut Butter',desc:'2 tablespoons',hint:'Just the PB',cal:190,max:400},
  {emoji:'🧀',name:'Cheese Slice',desc:'One slice American cheese',hint:'Single slice',cal:70,max:200},
  {emoji:'🍫',name:'Snickers Bar',desc:'Full size candy bar',hint:'Not fun size',cal:250,max:600},
  {emoji:'🥔',name:'Baked Potato',desc:'Large plain baked potato',hint:'No toppings',cal:290,max:700},
  {emoji:'🥦',name:'Broccoli',desc:'One cup steamed broccoli',hint:'Plain, no butter',cal:55,max:200},
  {emoji:'🍺',name:'Beer',desc:'12oz regular beer',hint:'Not light',cal:150,max:400},
];
var lives=3,score=0,round=1,totalRounds=10,gs='idle',currentItem=null,usedIdx=[],answered=false;
var slider=document.getElementById('cal-slider');
var calDisplay=document.getElementById('cal-display');
var currentMax=1000;
function sliderToCal(pct){return Math.round(currentMax*Math.pow(pct/100,1.8));}
function updateCalDisplay(){calDisplay.textContent=sliderToCal(parseFloat(slider.value))+' cal';}
slider.addEventListener('input',updateCalDisplay);
function setupSlider(item){
  currentMax=item.max;slider.value=25;
  document.getElementById('sl-max').textContent=item.max;
  updateCalDisplay();
}
function updLives(){var h='';for(var i=0;i<3;i++)h+=(i<lives?'❤️':'🖤');document.getElementById('lives-disp').textContent=h;}
function loadItem(){
  answered=false;
  var pool=[];for(var i=0;i<ITEMS.length;i++)if(usedIdx.indexOf(i)===-1)pool.push(i);
  if(pool.length===0){usedIdx=[];pool=ITEMS.map(function(_,i){return i;});}
  var idx=pool[Math.floor(Math.random()*pool.length)];usedIdx.push(idx);
  currentItem=ITEMS[idx];
  document.getElementById('item-emoji').textContent=currentItem.emoji;
  document.getElementById('item-name').textContent=currentItem.name;
  document.getElementById('item-desc').textContent=currentItem.desc;
  document.getElementById('item-hint').textContent='💡 '+currentItem.hint;
  document.getElementById('round-label').textContent='ROUND '+round+' / '+totalRounds;
  document.getElementById('progress-fill').style.width=((round-1)/totalRounds*100)+'%';
  setupSlider(currentItem);
  document.getElementById('submit-btn').style.display='block';
  document.getElementById('submit-btn').disabled=false;
  document.getElementById('result-panel').style.display='none';
}
document.getElementById('submit-btn').addEventListener('click',function(){
  if(answered||!currentItem||gs!=='run')return;
  answered=true;document.getElementById('submit-btn').disabled=true;
  var guess=sliderToCal(parseFloat(slider.value));
  var actual=currentItem.cal;
  var diff=guess-actual;
  var absDiff=Math.abs(diff);
  var over=diff>50;
  var pts=0,grade='',gradeCol='#fff';
  if(diff>=-25&&diff<=50){pts=300;grade='NICE! 👍';gradeCol='#63caff';}
  else if(over){pts=0;grade='TOO HIGH! ❌';gradeCol='#ef4444';lives--;updLives();}
  else if(absDiff<=100){pts=200;grade='CLOSE! 🔥';gradeCol='#f97316';}
  else if(absDiff<=200){pts=100;grade='NOT BAD';gradeCol='#a78bfa';}
  else{pts=20;grade='WAY OFF';gradeCol='rgba(255,255,255,0.4)';}
  score+=pts;
  var panel=document.getElementById('result-panel');panel.style.display='block';
  var rt=document.getElementById('result-title');rt.textContent=grade;rt.style.color=gradeCol;
  var diffStr=diff===0?'Exact!':(diff>0?'+':'')+diff+' cal '+(diff>0?'over':'under');
  document.getElementById('result-detail').textContent='Actual: '+actual+' cal  ·  Your guess: '+guess+' cal\n'+diffStr;
  var ptsEl=document.getElementById('result-pts');ptsEl.textContent=pts>0?'+'+pts+' pts':'No points';ptsEl.style.color=pts>0?'#f97316':'#ef4444';
  if(lives<=0){setTimeout(endGame,1200);}else if(round>=totalRounds){setTimeout(endGame,1200);}
});
document.getElementById('next-btn').addEventListener('click',function(){
  if(lives<=0||round>=totalRounds){endGame();return;}
  round++;loadItem();
});
function endGame(){
  gs='done';var won=lives>0;
  document.getElementById('ov-emoji').textContent=won?'🏆':'💀';
  document.getElementById('ov-title').textContent=won?'HEALTHY!':'OVERATE!';
  document.getElementById('ov-sub').innerHTML='SCORE &nbsp;<span class="big">'+score+'</span><br>'+(won?'You counted those calories!':'You went way over!');
  document.getElementById('ov-play').textContent='PLAY AGAIN';
  var sb=document.getElementById('ov-share');sb.style.display='block';
  sb.onclick=function(){
    var txt='🔥 CALORIE COUNT\nScore: '+score+'\n▶ https://boltarcade.github.io/BoltArcade';
    if(navigator.share){navigator.share({text:txt});}
    else{navigator.clipboard.writeText(txt).then(function(){var t=document.getElementById('ov-copy');t.style.display='block';setTimeout(function(){t.style.display='none';},2000);});}
  };
  document.getElementById('ov').classList.remove('hidden');
}
function startGame(){
  lives=3;score=0;round=1;usedIdx=[];answered=false;gs='run';
  updLives();document.getElementById('ov-share').style.display='none';document.getElementById('ov-copy').style.display='none';
  document.getElementById('ov').classList.add('hidden');loadItem();
}
document.getElementById('ov-play').addEventListener('click',startGame);
document.getElementById('ov-play').addEventListener('touchend',function(e){e.preventDefault();startGame();});
}());
</script>
</body>
</html>

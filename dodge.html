<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>DODGE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@500;700&display=swap');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{height:100%;height:-webkit-fill-available}

body{
  width:100%;height:100vh;height:100dvh;
  overflow:hidden;
  background:#08080f;
  touch-action:none;
  -webkit-tap-highlight-color:transparent;
  -webkit-user-select:none;user-select:none;
  display:flex;flex-direction:column;align-items:center;
  justify-content:space-between;
  padding:env(safe-area-inset-top,6px) 0 env(safe-area-inset-bottom,8px);
  font-family:'Inter',sans-serif;color:#fff;
}

/* HEADER */
#header{
  flex-shrink:0;
  width:min(96vw,480px);
  display:flex;align-items:center;justify-content:space-between;
  padding:4px 2px 0;
}
#back{
  font-size:10px;letter-spacing:0.2em;text-transform:uppercase;
  color:rgba(255,255,255,0.22);text-decoration:none;
  transition:color 0.15s;min-width:56px;
}
#back:hover{color:rgba(255,255,255,0.6);}
#hd-center{text-align:center;}
#title{
  font-family:'Russo One',sans-serif;
  font-size:clamp(20px,5.5vw,32px);
  letter-spacing:0.15em;
  background:linear-gradient(90deg,#4cc9f0,#7b5ea7);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 10px rgba(76,201,240,0.4));
  animation:tp 2.5s ease-in-out infinite;
  line-height:1;
}
@keyframes tp{
  0%,100%{filter:drop-shadow(0 0 8px rgba(76,201,240,0.3));}
  50%{filter:drop-shadow(0 0 20px rgba(76,201,240,0.65));}
}
#tagline{font-size:9px;color:rgba(255,255,255,0.18);letter-spacing:0.28em;text-transform:uppercase;margin-top:2px;}
#hd-right{min-width:56px;}

/* CANVAS WRAPPER */
#wrap{
  flex:1 1 auto;
  position:relative;
  width:min(96vw,480px);
  min-height:0;
  margin:5px 0;
  border-radius:14px;
  overflow:hidden;
  background:#0a0a16;
  box-shadow:0 0 0 1.5px rgba(76,201,240,0.18),0 10px 40px rgba(0,0,0,0.7);
}
/* cursor:none only when playing — set via JS */
canvas{display:block;width:100%;height:100%;}

/* HUD */
#hud{
  flex-shrink:0;display:flex;gap:6px;
  width:min(96vw,480px);padding:0 1px;
}
.hc{
  flex:1;background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:10px;padding:4px 6px;text-align:center;
}
.hl{font-size:8px;color:rgba(255,255,255,0.25);letter-spacing:0.22em;text-transform:uppercase;line-height:1;}
.hv{
  display:block;font-family:'Russo One',sans-serif;
  font-size:clamp(15px,4vw,20px);line-height:1.1;
}
#hc1 .hv{color:#4cc9f0;}
#hc2 .hv{color:rgba(255,255,255,0.32);}
#hc3 .hv{color:#a78bfa;}

/* OVERLAY */
#ov{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;
  background:rgba(8,8,18,0.92);
  border-radius:14px;
  transition:opacity 0.22s;pointer-events:auto;
}
#ov.hidden{opacity:0;pointer-events:none;}
#ov-title{
  font-family:'Russo One',sans-serif;
  font-size:clamp(24px,7vw,46px);
  letter-spacing:0.14em;
  background:linear-gradient(90deg,#4cc9f0,#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
#ov-msg{
  font-size:clamp(10px,2.6vw,12px);
  color:rgba(255,255,255,0.35);
  letter-spacing:0.15em;text-align:center;
  padding:0 20px;line-height:1.7;font-weight:500;
}
#ov-msg .big{
  font-family:'Russo One',sans-serif;font-size:clamp(18px,5.5vw,28px);
  color:#4cc9f0;-webkit-text-fill-color:#4cc9f0;vertical-align:middle;
}
#ov-msg .wv{
  font-family:'Russo One',sans-serif;font-size:clamp(13px,3.8vw,18px);
  color:#a78bfa;-webkit-text-fill-color:#a78bfa;vertical-align:middle;
}
#pbtn{
  background:linear-gradient(90deg,#4cc9f0,#7b5ea7);
  border:none;border-radius:10px;color:#08080f;
  font-family:'Russo One',sans-serif;
  font-size:clamp(12px,3.2vw,14px);letter-spacing:0.2em;text-transform:uppercase;
  padding:12px 38px;cursor:pointer;
  -webkit-appearance:none;appearance:none;outline:none;touch-action:manipulation;
  box-shadow:0 4px 18px rgba(76,201,240,0.3);
  transition:transform 0.07s;margin-top:2px;font-weight:700;
}
#pbtn:hover{box-shadow:0 6px 26px rgba(76,201,240,0.5);}
#pbtn:active{transform:scale(0.95);}
#share-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);border-radius:10px;color:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:clamp(11px,3vw,13px);letter-spacing:0.15em;padding:10px 28px;cursor:pointer;-webkit-appearance:none;appearance:none;outline:none;touch-action:manipulation;display:none;margin-top:-4px;}
#share-toast{font-size:10px;color:#06d6a0;letter-spacing:0.15em;text-align:center;display:none;}
#ov-hint{font-size:9px;color:rgba(255,255,255,0.12);letter-spacing:0.2em;text-align:center;}
#share-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);border-radius:10px;color:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:clamp(11px,3vw,13px);letter-spacing:0.15em;padding:10px 28px;cursor:pointer;-webkit-appearance:none;appearance:none;outline:none;touch-action:manipulation;display:none;margin-top:-2px;}
#share-toast{font-size:10px;color:#06d6a0;letter-spacing:0.15em;text-align:center;display:none;}
</style>
</head>
<body>

<div id="header">
  <a id="back" href="index.html">← ARCADE</a>
  <div id="hd-center">
    <div id="title">DODGE</div>
    <div id="tagline">survive the rain</div>
  </div>
  <div id="hd-right"></div>
</div>

<div id="wrap">
  <canvas id="c"></canvas>
  <div id="ov">
    <div id="ov-title">DODGE</div>
    <div id="ov-msg">MOVE MOUSE OR DRAG<br>TO DODGE THE BLOCKS</div>
    <button id="pbtn" type="button">PLAY</button>
    <button id="share-btn" type="button">📤 SHARE RESULT</button>
    <div id="share-toast">✅ COPIED!</div>
    <div id="ov-hint">survive · waves get faster · don't get hit</div>
  </div>
</div>

<div id="hud">
  <div class="hc" id="hc1"><div class="hl">time</div><span class="hv" id="tv">0.0</span></div>
  <div class="hc" id="hc2"><div class="hl">best</div><span class="hv" id="bv">0.0</span></div>
  <div class="hc" id="hc3"><div class="hl">wave</div><span class="hv" id="wv">1</span></div>
</div>

<script>
(function(){
'use strict';

var canvas = document.getElementById('c');
var ctx    = canvas.getContext('2d');
var W, H;

function resize(){
  var r = document.getElementById('wrap').getBoundingClientRect();
  W = Math.round(r.width);
  H = Math.round(r.height);
  canvas.width  = W;
  canvas.height = H;
  if(typeof px !== 'undefined'){
    px = Math.min(Math.max(px, PS), W - PS);
    py = Math.min(Math.max(py, PS), H - PS);
  }
}
window.addEventListener('resize', resize);
resize();

/* COLOURS */
var BG     = '#0a0a16';
var CYAN   = '#4cc9f0';
var PURPLE = '#a78bfa';
var RED    = '#f94060';

/* STATE */
var gs = 'idle';
var elapsed = 0, best = 0, wave = 1, fr = 0;
var dflash = 0, waveFlash = 0;
var WAVE_SECS = 10;
var waveTimer = WAVE_SECS * 60;

/* PLAYER */
var PS, px, py, targetX, targetY;
var trail = [];

function initPlayer(){
  PS = Math.max(11, Math.round(Math.min(W, H) * 0.042));
  px = W / 2;
  py = H * 0.72;
  targetX = px;
  targetY = py;
  trail = [];
}
initPlayer();
window.addEventListener('resize', initPlayer);

/* CURSOR — hide only during play */
function setCursor(hide){
  canvas.style.cursor = hide ? 'none' : 'default';
}
setCursor(false);

/* INPUT */
function getPos(cx, cy){
  var r = canvas.getBoundingClientRect();
  return {
    x: (cx - r.left) * (W / r.width),
    y: (cy - r.top)  * (H / r.height)
  };
}
canvas.addEventListener('mousemove', function(e){
  if(gs !== 'run') return;
  var p = getPos(e.clientX, e.clientY);
  targetX = p.x; targetY = p.y;
}, {passive:true});
canvas.addEventListener('touchmove', function(e){
  e.preventDefault();
  if(gs !== 'run') return;
  var p = getPos(e.touches[0].clientX, e.touches[0].clientY);
  targetX = p.x; targetY = p.y;
}, {passive:false});
canvas.addEventListener('touchstart', function(e){
  e.preventDefault();
  if(gs !== 'run') return;
  var p = getPos(e.touches[0].clientX, e.touches[0].clientY);
  targetX = p.x; targetY = p.y;
}, {passive:false});

/* KEYBOARD */
var keys = {};
document.addEventListener('keydown', function(e){ keys[e.code] = true; });
document.addEventListener('keyup',   function(e){ keys[e.code] = false; });
function applyKeys(){
  if(gs !== 'run') return;
  var spd = Math.max(4, Math.round(Math.min(W, H) * 0.013));
  if(keys['ArrowLeft']  || keys['KeyA']) targetX = Math.max(PS, targetX - spd);
  if(keys['ArrowRight'] || keys['KeyD']) targetX = Math.min(W - PS, targetX + spd);
  if(keys['ArrowUp']    || keys['KeyW']) targetY = Math.max(PS, targetY - spd);
  if(keys['ArrowDown']  || keys['KeyS']) targetY = Math.min(H - PS, targetY + spd);
}
(function kloop(){ requestAnimationFrame(kloop); applyKeys(); }());

/* PARTICLES */
var pts = [];
function burst(x, y, col, n){
  for(var i = 0; i < n; i++){
    var a = Math.random() * Math.PI * 2, s = 1.5 + Math.random() * 4;
    pts.push({x:x, y:y, vx:Math.cos(a)*s, vy:Math.sin(a)*s - 1.5,
      col:col, life:1, dec:0.03 + Math.random()*0.04, r:2 + Math.random()*3});
  }
}
function tickPts(){
  for(var i = pts.length - 1; i >= 0; i--){
    var p = pts[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.life -= p.dec;
    if(p.life <= 0) pts.splice(i, 1);
  }
}
function drawPts(){
  for(var i = 0; i < pts.length; i++){
    var p = pts[i];
    ctx.save();
    ctx.globalAlpha = p.life * p.life;
    ctx.fillStyle = p.col;
    ctx.shadowColor = p.col; ctx.shadowBlur = 5;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

/* ENEMIES */
var enemies = [], spawnCD = 0;
var ECOLS = ['#f94060','#f97316','#ff2d6b','#fb923c'];
var EDARK = {'#f94060':'#6b0020','#f97316':'#6b2800','#ff2d6b':'#6b0030','#fb923c':'#6b3000'};

function waveSpeed(){ return 2.2 + wave * 0.55; }
function waveRate(){  return Math.max(14, 52 - wave * 4); }

function spawnEnemy(){
  var ew  = Math.max(16, Math.round(W * 0.06 + Math.random() * W * 0.08));
  var eh  = Math.max(16, Math.round(H * 0.04 + Math.random() * H * 0.06));
  var col = ECOLS[Math.floor(Math.random() * ECOLS.length)];
  var spd = waveSpeed() * (0.75 + Math.random() * 0.6);
  var vx  = (Math.random() - 0.5) * wave * 0.4;
  enemies.push({x: ew/2 + Math.random()*(W-ew), y: -eh,
    w:ew, h:eh, vx:vx, vy:spd, col:col, rot:0,
    rotSpd:(Math.random()-0.5)*0.06});
}
function tickEnemies(){
  for(var i = 0; i < enemies.length; i++){
    var e = enemies[i];
    e.x += e.vx; e.y += e.vy; e.rot += e.rotSpd;
    if(e.x - e.w/2 < 0)  { e.x = e.w/2;    e.vx =  Math.abs(e.vx); }
    if(e.x + e.w/2 > W)  { e.x = W - e.w/2; e.vx = -Math.abs(e.vx); }
  }
  var k = [];
  for(var i = 0; i < enemies.length; i++) if(enemies[i].y < H + 60) k.push(enemies[i]);
  enemies = k;

  spawnCD--;
  if(spawnCD <= 0){
    spawnEnemy();
    if(wave >= 4 && Math.random() < 0.3) spawnEnemy();
    spawnCD = waveRate() + Math.floor(Math.random() * 12);
  }
}
function drawEnemies(){
  for(var i = 0; i < enemies.length; i++){
    var e = enemies[i];
    ctx.save();
    ctx.translate(e.x, e.y); ctx.rotate(e.rot);
    ctx.shadowColor = e.col; ctx.shadowBlur = 14;
    var g = ctx.createLinearGradient(-e.w/2,-e.h/2, e.w/2, e.h/2);
    g.addColorStop(0,'#fff'); g.addColorStop(0.2, e.col);
    g.addColorStop(1, EDARK[e.col] || '#300020');
    ctx.fillStyle = g;
    rrect(ctx, -e.w/2, -e.h/2, e.w, e.h, 5); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.22)';
    ctx.fillRect(-e.w/2+2, -e.h/2+2, e.w-4, 4);
    ctx.restore();
  }
}

/* COLLISION */
function checkHit(){
  var m = 2;
  var l=px-PS+m, r=px+PS-m, t=py-PS+m, b=py+PS-m;
  for(var i = 0; i < enemies.length; i++){
    var e = enemies[i];
    if(l < e.x+e.w/2 && r > e.x-e.w/2 && t < e.y+e.h/2 && b > e.y-e.h/2) return true;
  }
  return false;
}

/* STARS */
var stars = [];
function makeStars(){
  stars = [];
  for(var i = 0; i < 65; i++) stars.push({
    x:Math.random()*W, y:Math.random()*H,
    r:Math.random()*1.2+0.2, a:Math.random()*0.4+0.1,
    tw:Math.random()*Math.PI*2, ts:0.015+Math.random()*0.025
  });
}
makeStars();
window.addEventListener('resize', makeStars);

/* DRAW BACKGROUND */
function drawBg(){
  ctx.fillStyle = BG; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = 'rgba(76,201,240,0.016)';
  for(var sy = 0; sy < H; sy += 4) ctx.fillRect(0, sy, W, 1);
  for(var i = 0; i < stars.length; i++){
    var s = stars[i]; s.tw += s.ts;
    var ta = s.a * (0.4 + 0.6 * Math.abs(Math.sin(s.tw)));
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(200,220,255,' + ta.toFixed(2) + ')'; ctx.fill();
  }
  var vg = ctx.createRadialGradient(W/2,H/2,H*0.2, W/2,H/2,H*0.85);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,10,0.5)');
  ctx.fillStyle = vg; ctx.fillRect(0,0,W,H);
}

/* DRAW PLAYER */
function drawPlayer(){
  for(var i = 0; i < trail.length; i++){
    var t = trail[i], a = (i / trail.length) * 0.38;
    var ts = PS * (0.4 + 0.6*(i/trail.length));
    ctx.save(); ctx.globalAlpha = a * 0.5;
    ctx.fillStyle = CYAN; ctx.shadowColor = CYAN; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(t.x, t.y, ts, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  ctx.save();
  ctx.shadowColor = CYAN; ctx.shadowBlur = 22;
  var pg = ctx.createRadialGradient(px-PS*0.2,py-PS*0.2,PS*0.1, px,py,PS);
  pg.addColorStop(0,'#a5f3fc'); pg.addColorStop(0.6,CYAN); pg.addColorStop(1,'#0e7490');
  ctx.fillStyle = pg;
  ctx.beginPath(); ctx.arc(px, py, PS, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,255,255,0.32)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(px, py, PS*0.6, 0, Math.PI*2); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.52)';
  ctx.beginPath(); ctx.arc(px-PS*0.27, py-PS*0.27, PS*0.2, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

/* WAVE BANNER */
var waveBanner = 0, waveText = '';
function triggerWaveBanner(txt){ waveText = txt; waveBanner = 90; }
function drawWaveBanner(){
  if(waveBanner <= 0) return;
  waveBanner--;
  var alpha = waveBanner > 60 ? 1 : waveBanner / 60;
  var scale = waveBanner > 70 ? 1 + (90 - waveBanner) * 0.015 : 1;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(W/2, H*0.3); ctx.scale(scale, scale);
  ctx.font = 'bold ' + Math.round(H*0.07) + 'px Russo One, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = PURPLE; ctx.shadowColor = PURPLE; ctx.shadowBlur = 20;
  ctx.fillText(waveText, 0, 0);
  ctx.restore();
}

/* COUNTDOWN TIMER — top-right of canvas */
function drawCountdown(){
  var secsLeft = Math.max(0, Math.ceil(waveTimer / 60));
  var pct      = Math.max(0, waveTimer / (WAVE_SECS * 60));

  var pad  = Math.round(W * 0.035);
  var sz   = Math.round(Math.min(W, H) * 0.1);   // size of the widget
  var cx   = W - pad - sz / 2;
  var cy   = pad + sz / 2;
  var rad  = sz * 0.38;

  var urgent = secsLeft <= 3;
  var arcCol = urgent ? RED : secsLeft <= 5 ? '#f97316' : CYAN;

  ctx.save();

  /* background circle */
  ctx.beginPath(); ctx.arc(cx, cy, sz/2, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(10,10,22,0.78)';
  ctx.fill();
  ctx.strokeStyle = urgent ? 'rgba(249,64,96,0.55)' : 'rgba(76,201,240,0.2)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  /* track ring */
  ctx.beginPath(); ctx.arc(cx, cy, rad, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth = 3.5; ctx.stroke();

  /* progress arc */
  ctx.beginPath();
  ctx.arc(cx, cy, rad, -Math.PI/2, -Math.PI/2 + Math.PI*2*pct);
  ctx.strokeStyle = arcCol;
  ctx.lineWidth = 3.5;
  ctx.shadowColor = arcCol; ctx.shadowBlur = 8;
  ctx.stroke();
  ctx.shadowBlur = 0;

  /* number */
  var fs = Math.round(sz * 0.36);
  ctx.font = 'bold ' + fs + 'px Russo One, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = urgent ? RED : 'rgba(255,255,255,0.88)';
  if(urgent){ ctx.shadowColor = RED; ctx.shadowBlur = 10; }
  ctx.fillText(secsLeft, cx, cy + 1);
  ctx.shadowBlur = 0;

  /* "NEXT" label */
  ctx.font = 'bold ' + Math.round(fs*0.4) + 'px Inter, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillText('NEXT', cx, cy + sz*0.38);

  ctx.restore();
}

/* HELPERS */
function rrect(c, x, y, w, h, r){
  c.beginPath();
  c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y);
  c.closePath();
}

/* HUD */
function updHUD(){
  document.getElementById('tv').textContent = (elapsed/60).toFixed(1);
  document.getElementById('bv').textContent = (best/60).toFixed(1);
  document.getElementById('wv').textContent = wave;
}

/* OVERLAY */
function showOv(t, m, b){
  document.getElementById('ov-title').textContent = t;
  document.getElementById('ov-msg').innerHTML = m;
  document.getElementById('pbtn').textContent = b;
  document.getElementById('ov').classList.remove('hidden');
  setCursor(false);
}

/* MAIN LOOP */
function loop(){
  requestAnimationFrame(loop);
  fr++;

  if(gs === 'run'){
    elapsed++;

    /* smooth follow */
    px += (targetX - px) * 0.18;
    py += (targetY - py) * 0.18;
    px = Math.min(Math.max(px, PS), W - PS);
    py = Math.min(Math.max(py, PS), H - PS);

    trail.push({x:px, y:py});
    if(trail.length > 16) trail.shift();

    tickEnemies();
    tickPts();

    /* wave countdown */
    waveTimer--;
    if(waveTimer <= 0){
      wave++;
      waveTimer = WAVE_SECS * 60;
      waveFlash = 18;
      triggerWaveBanner('WAVE ' + wave + '!');
      burst(W/2, H/2, PURPLE, 20);
    }

    updHUD();

    if(checkHit()){
      gs = 'dead'; dflash = 12;
      if(elapsed > best) best = elapsed;
      burst(px, py, CYAN, 18); burst(px, py, RED, 12);
      setCursor(false);
      var fe = (elapsed/60).toFixed(1), fw = wave;
      setTimeout(function(){
        showOv('DEAD',
          'TIME &nbsp;<span class="big">' + fe + 's</span><br>' +
          'WAVE &nbsp;<span class="wv">' + fw + '</span>',
          'RETRY');
        var sb=document.getElementById('share-btn');sb.style.display='block';
        sb.onclick=function(){var txt='💎 DODGE\nSurvived: '+fe+'s | Wave: '+fw+'\nPlay at boltgame.netlify.app';if(navigator.share){navigator.share({text:txt});}else{navigator.clipboard.writeText(txt).then(function(){var t=document.getElementById('share-toast');t.style.display='block';setTimeout(function(){t.style.display='none';},2000);});}};
      }, 420);
    }
  } else {
    tickPts();
  }

  /* RENDER */
  drawBg();
  drawEnemies();
  drawPlayer();
  drawPts();
  drawWaveBanner();
  if(gs === 'run') drawCountdown();

  if(waveFlash > 0){
    ctx.fillStyle = 'rgba(167,139,250,' + (waveFlash*0.04) + ')';
    ctx.fillRect(0,0,W,H); waveFlash--;
  }
  if(dflash > 0){
    ctx.fillStyle = 'rgba(249,64,96,' + (dflash*0.055) + ')';
    ctx.fillRect(0,0,W,H); dflash--;
  }
}

/* START */
function startGame(){
  elapsed = 0; wave = 1; fr = 0;
  waveTimer = WAVE_SECS * 60; waveFlash = 0;
  enemies = []; spawnCD = 40;
  pts = []; waveBanner = 0; dflash = 0;
  initPlayer(); targetX = px; targetY = py;
  gs = 'run';
  document.getElementById('share-btn').style.display='none';
  document.getElementById('share-toast').style.display='none';
  document.getElementById('ov').classList.add('hidden');
  setCursor(true);
  triggerWaveBanner('WAVE 1');
  updHUD();
}

var pb = document.getElementById('pbtn');
pb.addEventListener('touchend', function(e){ e.preventDefault(); startGame(); });
pb.addEventListener('click', startGame);

showOv('DODGE','MOVE MOUSE OR DRAG<br>TO DODGE THE BLOCKS','PLAY');
updHUD();
loop();
}());
</script>
</body>
